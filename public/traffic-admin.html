<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Ops - Admin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b0e'/%3E%3Crect x='6' y='18' width='5' height='8' rx='1.5' fill='%23f59e0b'/%3E%3Crect x='13.5' y='12' width='5' height='14' rx='1.5' fill='%23f59e0b'/%3E%3Crect x='21' y='7' width='5' height='19' rx='1.5' fill='%23f59e0b'/%3E%3C/svg%3E">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        body {
            background-color: #09090b;
            color: #e4e4e7;
            font-family: 'Courier New', Courier, monospace;
        }

        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #18181b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .accordion-content.expanded {
            max-height: 1000px;
            opacity: 1;
        }

        .queries-table th {
            position: sticky;
            top: 0;
            background-color: #18181b;
            z-index: 10;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#09090b',
                        panel: '#18181b',
                    }
                }
            }
        }
    </script>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Session-expiry guard ---
        // If a request comes back 401 (dead session after a server restart or 12h TTL), do NOT swallow it:
        // surface a blocking overlay so edits are never lost silently. Unsaved text stays in the fields.
        let __authExpired = false;
        function flagAuthExpired() {
            if (__authExpired) return;
            __authExpired = true;
            window.dispatchEvent(new CustomEvent('auth-expired'));
        }

        // --- Flush pending autosaves before the tab closes/hides, so a debounced (800ms) note/comment
        // is never lost if the user closes the tab right after typing. Each row registers a flush fn here.
        const __dirtyFlushers = new Set();
        function __flushAllDirty() { __dirtyFlushers.forEach(f => { try { f(); } catch (e) {} }); }
        window.addEventListener('pagehide', __flushAllDirty);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') __flushAllDirty(); });

        function SessionExpiredOverlay() {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const h = () => setShow(true);
                window.addEventListener('auth-expired', h);
                return () => window.removeEventListener('auth-expired', h);
            }, []);
            if (!show) return null;
            return (
                <div style={{position:'fixed',inset:0,zIndex:99999,background:'rgba(0,0,0,0.85)',backdropFilter:'blur(2px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <div style={{maxWidth:'440px',margin:'16px',background:'#18181b',border:'1px solid #ef4444',borderRadius:'14px',padding:'28px',textAlign:'center',fontFamily:'sans-serif'}}>
                        <div style={{fontSize:'42px',marginBottom:'10px'}}>⚠️</div>
                        <div style={{fontSize:'17px',fontWeight:700,color:'#f87171',marginBottom:'10px'}}>Сессия истекла</div>
                        <div style={{fontSize:'13px',lineHeight:1.6,color:'#a1a1aa',marginBottom:'20px'}}>
                            Последние изменения <b style={{color:'#e4e4e7'}}>не сохранены</b>. Ваш текст остался в полях и не потерян.<br/>
                            Откройте вход <b style={{color:'#e4e4e7'}}>в новой вкладке</b>, войдите, вернитесь сюда и сохраните снова.
                        </div>
                        <a href="/login.html" target="_blank" rel="noopener" style={{display:'inline-block',background:'#ef4444',color:'#fff',padding:'11px 22px',borderRadius:'9px',fontSize:'14px',fontWeight:600,textDecoration:'none'}}>Войти заново</a>
                        <div style={{marginTop:'14px'}}>
                            <button onClick={() => window.location.reload()} style={{background:'none',border:'none',color:'#71717a',fontSize:'12px',cursor:'pointer',textDecoration:'underline'}}>Обновить страницу</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- CUSTOM STATUS CONFIG ---
        const CUSTOM_STATUSES = [
            { key: 'warmup', label: 'ПРОГРЕВ', color: 'text-orange-400', bg: 'bg-orange-500/10', border: 'border-orange-500/20', icon: 'fa-fire' },
            { key: 'verif', label: 'ВЕРИФ', color: 'text-blue-400', bg: 'bg-blue-500/10', border: 'border-blue-500/20', icon: 'fa-shield-alt' },
            { key: 'live', label: 'БОЕВОЙ', color: 'text-green-400', bg: 'bg-green-500/10', border: 'border-green-500/20', icon: 'fa-rocket' },
            { key: 'ban', label: 'БАН', color: 'text-red-400', bg: 'bg-red-500/10', border: 'border-red-500/20', icon: 'fa-ban' },
        ];
        const STATUS_MAP = Object.fromEntries(CUSTOM_STATUSES.map(s => [s.key, s]));
        const DEFAULT_STATUS = CUSTOM_STATUSES[0];

        const mockCampaignsData = [];

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            return Promise.resolve();
        }

        // --- COMPONENTS ---

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        };

        const formatNumber = (val) => {
            return new Intl.NumberFormat('ru-RU').format(val);
        };

        const CampaignRow = ({ data, onRefresh, index, onDragStart, onDragEnter, onDragEnd, isDraggedOver, isDragged }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const isDg = /demand\s?gen/i.test(data.customName || '');
            const [dgDep, setDgDep] = useState(data.dgDep !== false);
            const [dgReg, setDgReg] = useState(data.dgReg !== false);
            const [dgConvs, setDgConvs] = useState(null);
            const [dgLoading, setDgLoading] = useState(false);
            useEffect(() => {
                if (!isExpanded || !isDg || dgConvs !== null) return;
                setDgLoading(true);
                fetch(`/api/dg/conversions?campaign=${encodeURIComponent(data.customName)}`)
                    .then(r => r.ok ? r.json() : { rows: [] })
                    .then(j => setDgConvs(j.rows || []))
                    .catch(() => setDgConvs([]))
                    .finally(() => setDgLoading(false));
            }, [isExpanded, isDg]);
            const saveDgToggle = async (field, val) => {
                try { await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [field]: val }), keepalive: true }); } catch (e) {}
            };
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editName, setEditName] = useState(data.customName);
            const [editUrl, setEditUrl] = useState(data.url || '');
            const [editSiteUrl, setEditSiteUrl] = useState(data.siteUrl || '');
            const [isSavingEdit, setIsSavingEdit] = useState(false);

            const [comment, setComment] = useState(data.comment || '');
            const [isSavingComment, setIsSavingComment] = useState(false);
            const [showAlertPopup, setShowAlertPopup] = useState(false);
            const [alertValue, setAlertValue] = useState(data.costAlert || '');
            const [costAlert, setCostAlert] = useState(data.costAlert || 0);
            const [costAlertNote, setCostAlertNote] = useState(data.costAlertNote || '');
            const [campTask, setCampTask] = useState(data.campTask || '');
            const [showTaskPopup, setShowTaskPopup] = useState(false);
            const [taskInput, setTaskInput] = useState('');
            const [campNote, setCampNote] = useState(data.campNote || '');
            const [isSavingNote, setIsSavingNote] = useState(false);
            const [campTimer, setCampTimer] = useState(data.campTimer || 0);
            const [, forceUpdate] = useState(0);

            const handleSaveAlert = async () => {
                const val = parseFloat(alertValue) || 0;
                setCostAlert(val);
                setShowAlertPopup(false);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ costAlert: val, costAlertNote }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save alert', e); }
            };
            const handleDisableAlert = async () => {
                setCostAlert(0);
                setAlertValue('');
                setCostAlertNote('');
                setShowAlertPopup(false);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ costAlert: 0, costAlertNote: '' }), keepalive: true
                    });
                } catch (e) { console.error('Failed to disable alert', e); }
            };
            const handleSaveTask = async (text) => {
                setCampTask(text);
                setShowTaskPopup(false);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campTask: text }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save task', e); }
            };

            const TIMER_DURATION = 24 * 60 * 60 * 1000;
            const timerActive = campTimer > 0 && (Date.now() - campTimer) < TIMER_DURATION;
            const timerProgress = timerActive ? Math.max(0, 1 - (Date.now() - campTimer) / TIMER_DURATION) : 0;

            useEffect(() => {
                if (!timerActive) return;
                const iv = setInterval(() => forceUpdate(n => n + 1), 30000);
                return () => clearInterval(iv);
            }, [timerActive]);

            const handleToggleTimer = async () => {
                const newVal = timerActive ? 0 : Date.now();
                setCampTimer(newVal);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campTimer: newVal }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save timer', e); }
            };

            const commentTimer = useRef(null);
            const lastSavedComment = useRef(data.comment || '');

            const hasQueries = data.queries && data.queries.length > 0;
            const hasKeywords = data.keywords && data.keywords.length > 0;
            const hasAdTexts = data.adTexts && data.adTexts.length > 0;
            const hasAnyExpand = hasQueries || hasKeywords || hasAdTexts || isDg;
            const [activeTab, setActiveTab] = useState(hasQueries ? 'queries' : hasKeywords ? 'keywords' : 'adTexts');
            const [customStatus, setCustomStatus] = useState(data.customStatus || 'warmup');
            const [showStatusPicker, setShowStatusPicker] = useState(false);
            const statusInfo = STATUS_MAP[customStatus] || DEFAULT_STATUS;

            const [primaryKeyword, setPrimaryKeyword] = useState(data.primaryKeyword || '');
            React.useEffect(() => { setPrimaryKeyword(data.primaryKeyword || ''); }, [data.primaryKeyword]);

            const handlePrimaryKeywordToggle = async (kwText) => {
                const next = (primaryKeyword || '').trim().toLowerCase() === (kwText || '').trim().toLowerCase() ? '' : kwText;
                setPrimaryKeyword(next);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ primaryKeyword: next }),
                        keepalive: true
                    });
                } catch (e) { console.error('Failed to save primary keyword', e); }
            };

            const handleStatusChange = async (newKey) => {
                setCustomStatus(newKey);
                setShowStatusPicker(false);
                try {
                    await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customStatus: newKey }),
                        keepalive: true
                    });
                } catch (e) { console.error('Failed to save status', e); }
            };

            const saveComment = useCallback(async (value) => {
                if (value === lastSavedComment.current) return;
                setIsSavingComment(true);
                try {
                    const res = await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment: value }),
                        keepalive: true
                    });
                    if (res.ok) lastSavedComment.current = value;
                    else if (res.status === 401) flagAuthExpired();
                } catch(e) {
                    console.error('Failed to save comment', e);
                } finally {
                    setIsSavingComment(false);
                }
            }, [data.customName]);

            const handleCommentChange = useCallback((e) => {
                const val = e.target.value;
                setComment(val);
                if (commentTimer.current) clearTimeout(commentTimer.current);
                commentTimer.current = setTimeout(() => saveComment(val), 800);
            }, [saveComment]);

            const handleCommentBlur = useCallback(() => {
                if (commentTimer.current) clearTimeout(commentTimer.current);
                saveComment(comment);
            }, [comment, saveComment]);

            useEffect(() => () => { if (commentTimer.current) clearTimeout(commentTimer.current); }, []);

            useEffect(() => {
                if (data.comment === undefined) return;
                if (data.comment === lastSavedComment.current) return;
                if (comment !== lastSavedComment.current) return;
                setComment(data.comment || '');
                lastSavedComment.current = data.comment || '';
            }, [data.comment]);

            const noteTimer = useRef(null);
            const lastSavedNote = useRef(data.campNote || '');

            const saveNote = useCallback(async (value) => {
                if (value === lastSavedNote.current) return;
                setIsSavingNote(true);
                try {
                    const res = await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campNote: value }),
                        keepalive: true
                    });
                    if (res.ok) lastSavedNote.current = value;
                    else if (res.status === 401) flagAuthExpired();
                } catch(e) {
                    console.error('Failed to save note', e);
                } finally {
                    setIsSavingNote(false);
                }
            }, [data.customName]);

            const handleNoteChange = useCallback((e) => {
                const val = e.target.value;
                setCampNote(val);
                if (noteTimer.current) clearTimeout(noteTimer.current);
                noteTimer.current = setTimeout(() => saveNote(val), 800);
            }, [saveNote]);

            const handleNoteBlur = useCallback(() => {
                if (noteTimer.current) clearTimeout(noteTimer.current);
                saveNote(campNote);
            }, [campNote, saveNote]);

            useEffect(() => () => { if (noteTimer.current) clearTimeout(noteTimer.current); }, []);

            useEffect(() => {
                if (data.campNote === undefined) return;
                if (data.campNote === lastSavedNote.current) return;
                if (campNote !== lastSavedNote.current) return;
                setCampNote(data.campNote || '');
                lastSavedNote.current = data.campNote || '';
            }, [data.campNote]);

            // Flush pending (debounced) note/comment if this row unmounts or the tab closes/hides.
            // saveNote/saveComment are no-ops when the value is unchanged, so a clean field costs nothing.
            const campNoteRef = useRef(campNote); campNoteRef.current = campNote;
            const commentRef = useRef(comment); commentRef.current = comment;
            const saveNoteRef = useRef(saveNote); saveNoteRef.current = saveNote;
            const saveCommentRef = useRef(saveComment); saveCommentRef.current = saveComment;
            useEffect(() => {
                const flush = () => { saveNoteRef.current(campNoteRef.current); saveCommentRef.current(commentRef.current); };
                __dirtyFlushers.add(flush);
                return () => { __dirtyFlushers.delete(flush); flush(); };
            }, []);

            useEffect(() => {
                if (data.costAlertNote === undefined) return;
                if (showAlertPopup) return;
                setCostAlertNote(data.costAlertNote || '');
            }, [data.costAlertNote, showAlertPopup]);

            useEffect(() => {
                if (data.costAlert === undefined) return;
                setCostAlert(data.costAlert || 0);
                if (!showAlertPopup) setAlertValue(data.costAlert || '');
            }, [data.costAlert, showAlertPopup]);

            const handleSaveEdit = async () => {
                if (!editName.trim() || !editUrl.trim()) { alert('Заполните оба поля'); return; }
                setIsSavingEdit(true);
                try {
                    const res = await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}/edit`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ newName: editName.trim(), newUrl: editUrl.trim(), newSiteUrl: editSiteUrl.trim() })
                    });
                    if (res.ok) { setShowEditModal(false); onRefresh(); }
                    else { const err = await res.json().catch(() => ({})); alert(err.error || 'Ошибка сохранения'); }
                } catch (e) { alert('Ошибка сети'); }
                finally { setIsSavingEdit(false); }
            };

            const handleDelete = async (e) => {
                e.stopPropagation();
                if (!confirm(`Удалить кампанию "${data.customName}"?`)) return;
                setIsDeleting(true);
                try {
                    const res = await fetch(`/api/traffic-admin/${encodeURIComponent(data.customName)}`, { method: 'DELETE' });
                    if (res.ok) {
                        onRefresh();
                    } else {
                        alert('Ошибка удаления. Возможно, кампания уже удалена.');
                        setIsDeleting(false);
                    }
                } catch(err) {
                    alert('Ошибка сети при удалении');
                    setIsDeleting(false);
                }
            };

            const handleRefresh = async (e) => {
                e.stopPropagation();
                if (isRefreshing) return;
                setIsRefreshing(true);
                if (onRefresh) {
                    await onRefresh(data.customName);
                }
                setIsRefreshing(false);
            };

            return (
                <div
                    data-camp-name={data.customName}
                    className={`flex flex-col border-b transition-all duration-200 group ${
                        isDragged ? 'opacity-20 scale-[0.98] grayscale' : ''
                    } ${
                        isDraggedOver ? 'border-t-2 border-t-purple-500 shadow-[0_-8px_15px_-5px_rgba(168,85,247,0.4)] bg-zinc-900/60 relative z-10' : 'border-zinc-800/50 hover:bg-zinc-900/30'
                    }`}
                    onMouseEnter={() => { if (onDragEnter) onDragEnter(index); }}
                >
                    <div className="flex items-center p-3 relative">
                        <div 
                            className="w-6 h-8 flex-shrink-0 flex items-center justify-center cursor-grab active:cursor-grabbing text-zinc-600 hover:text-zinc-200 transition-colors mr-1 select-none" 
                            title="Перетащите для перемещения"
                            onMouseDown={(e) => {
                                e.preventDefault();
                                if (onDragStart) onDragStart(index);
                            }}
                        >
                            <i className="fas fa-grip-vertical text-[11px] pointer-events-none"></i>
                        </div>
                        <div className="w-5 flex-shrink-0 flex items-center justify-center">
                            {hasAnyExpand && (
                                <button
                                    onClick={() => setIsExpanded(!isExpanded)}
                                    className="w-6 h-6 rounded flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-colors"
                                >
                                    <i className={`fas fa-chevron-${isExpanded ? 'down' : 'right'} text-[10px]`}></i>
                                </button>
                            )}
                        </div>

                        <div className="flex-1 min-w-0 pr-4">
                            <div className="flex items-center gap-3 mb-1">
                                <h3 className="font-bold text-sm text-zinc-100 truncate">{data.customName}</h3>
                                <div className="relative">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setShowStatusPicker(!showStatusPicker); }}
                                        className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border flex items-center gap-1.5 cursor-pointer hover:opacity-80 transition-opacity ${statusInfo.bg} ${statusInfo.color} ${statusInfo.border}`}
                                    >
                                        <i className={`fas ${statusInfo.icon} text-[8px]`}></i>
                                        {statusInfo.label}
                                        <i className="fas fa-caret-down text-[7px] ml-0.5 opacity-50"></i>
                                    </button>
                                    {showStatusPicker && (
                                        <div className="absolute top-7 left-0 z-50 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl py-1 w-32">
                                            {CUSTOM_STATUSES.map(s => (
                                                <button key={s.key} onClick={(e) => { e.stopPropagation(); handleStatusChange(s.key); }}
                                                    className={`w-full px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider flex items-center gap-2 hover:bg-zinc-800 transition-colors ${s.color} ${customStatus === s.key ? 'bg-zinc-800' : ''}`}>
                                                    <i className={`fas ${s.icon} text-[8px]`}></i>
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                {data.url && (
                                    <button 
                                        onClick={(e) => {
                                            copyToClipboard(data.url);
                                            const icon = e.currentTarget.querySelector('i');
                                            icon.className = 'fas fa-check text-green-400 text-[10px]';
                                            setTimeout(() => icon.className = 'fas fa-link text-[10px]', 1500);
                                        }}
                                        className="text-zinc-500 hover:text-white transition-colors"
                                        title="Скопировать ссылку на таблицу"
                                    >
                                        <i className="fas fa-link text-[10px]"></i>
                                    </button>
                                )}
                            </div>
                            <div className="text-[10px] text-zinc-500 flex items-center gap-2 flex-wrap">
                                <span title="Системное имя в Google Ads" className="truncate max-w-[200px] inline-block">{data.name}</span>
                                {data.siteUrl && (
                                    <React.Fragment>
                                        <span>•</span>
                                        <button
                                            type="button"
                                            onClick={(e) => {
                                                const url = data.siteUrl;
                                                const fallback = () => {
                                                    const ta = document.createElement('textarea');
                                                    ta.value = url;
                                                    ta.style.position = 'fixed';
                                                    ta.style.left = '-9999px';
                                                    document.body.appendChild(ta);
                                                    ta.select();
                                                    try { document.execCommand('copy'); } catch (_) {}
                                                    document.body.removeChild(ta);
                                                };
                                                if (navigator.clipboard && navigator.clipboard.writeText) {

function runThirdPartyService(spreadsheet, accountId, accountName, currency) {
  var now = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd HH:mm:ss');
  var today = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd');
  var yesterday = Utilities.formatDate(new Date(Date.now() - 86400000), 'UTC', 'yyyy-MM-dd');

  var infoSheet = getOrCreateSheet(spreadsheet, 'Info');
  infoSheet.clear();
  infoSheet.appendRow(['account_id', 'account_name', 'currency', 'updated_at', 'script_run_at']);
  infoSheet.appendRow([accountId, accountName, currency, now, now]);

  var adsSheet = getOrCreateSheet(spreadsheet, 'Ads');
  adsSheet.clear();
  adsSheet.appendRow([
    'campaign_name', 'ad_group_name', 'ad_headline', 'ad_type', 'ad_id',
    'status', 'cost', 'currency', 'clicks', 'impressions', 'conversions', 'avg_cpc', 'date', 'period'
  ]);

  var periods = [
    { label: 'today', apiLabel: 'TODAY', date: today },
    { label: 'yesterday', apiLabel: 'YESTERDAY', date: yesterday },
    { label: 'last_7_days', apiLabel: 'LAST_7_DAYS', date: today },
    { label: 'last_14_days', apiLabel: 'LAST_14_DAYS', date: today },
    { label: 'last_30_days', apiLabel: 'LAST_30_DAYS', date: today },
    { label: 'this_month', apiLabel: 'THIS_MONTH', date: today },
    { label: 'last_month', apiLabel: 'LAST_MONTH', date: today },
    { label: 'this_week_mon_today', apiLabel: 'THIS_WEEK_MON_TODAY', date: today },
    { label: 'last_week_sun_sat', apiLabel: 'LAST_WEEK_SUN_SAT', date: today },
    { label: 'last_business_week', apiLabel: 'LAST_BUSINESS_WEEK', date: today }
  ];

  var existingData = new Set();
  var totalAdded = 0;
  for (var i = 0; i < periods.length; i++) {
    var added = addDataForPeriod(periods[i], adsSheet, existingData, currency);
    totalAdded += added;
  }
}

function addDataForPeriod(periodConfig, adsSheet, existingData, currency) {
  var apiLabel = periodConfig.apiLabel;
  var period = periodConfig.label;
  var dateStr = periodConfig.date;
  var adIterator = AdsApp.ads().forDateRange(apiLabel).get();
  var added = 0;

  while (adIterator.hasNext()) {
    var ad = adIterator.next();
    var adType = getAdType(ad);
    var headline = getAdHeadline(ad);
    var adId = getAdId(ad);
    var stats = ad.getStatsFor(apiLabel);
    var campaignName = ad.getCampaign().getName();
    var adGroupName = ad.getAdGroup().getName();
    var status = ad.isEnabled() ? 'enabled' : 'paused';
    
    var key = dateStr + '|' + period + '|' + campaignName + '|' + adGroupName + '|' + adId;
    
    if (!existingData.has(key)) {
      adsSheet.appendRow([
        campaignName, adGroupName, headline, adType, adId, status,
        stats.getCost(), currency, stats.getClicks(), stats.getImpressions(),
        stats.getConversions(), stats.getAverageCpc(), dateStr, period
      ]);
      existingData.add(key);
      added++;
    }
  }
  return added;
}

function getAdId(ad) {
  try {
    var fullId = ad.getId().toString();
    var parts = fullId.split('/');
    return parts.length > 1 ? parts[parts.length - 1] : fullId;
  } catch (e) { return ''; }
}

function getAdType(ad) {
  if (ad.isType().responsiveSearchAd()) return 'RSA';
  if (ad.isType().expandedTextAd()) return 'ETA';
  if (ad.isType().imageAd()) return 'IMAGE';
  if (ad.isType().videoAd()) return 'VIDEO';
  return 'OTHER';
}

function getAdHeadline(ad) {
  if (ad.isType().responsiveSearchAd()) {
    var headlines = ad.asType().responsiveSearchAd().getHeadlines();
    if (headlines && headlines.length > 0) {
      var allHeadlines = [];
      for (var i = 0; i < Math.min(headlines.length, 5); i++) {
        if (headlines[i].text) allHeadlines.push(headlines[i].text);
      }
      return allHeadlines.join(' | ') || '';
    }
  }
  try { return ad.getHeadline() || ''; } catch (e) { return ''; }
}

  Logger.log('Создаём новую таблицу для ' + accountName + ' (' + accountId + ')');
  var spreadsheet = SpreadsheetApp.create('Google Ads Data - ' + accountName + ' (' + accountId + ')');
  var newSheetId = spreadsheet.getId();

function tryOpenSpreadsheet(sheetId, props) {
  var maxAttempts = 3;
  var lastError = null;

  for (var i = 0; i < maxAttempts; i++) {
    try {
      return SpreadsheetApp.openById(sheetId);
    } catch (e) {
      lastError = e;
      var msg = (e.message || '').toLowerCase();

      if (msg.indexOf('not found') !== -1 ||
          msg.indexOf('invalid') !== -1 ||
          msg.indexOf('does not exist') !== -1 ||
          msg.indexOf('unable to find') !== -1) {
        Logger.log('Таблица ' + sheetId + ' реально удалена: ' + e.message);
        props.deleteProperty('SHEET_ID');
        props.deleteProperty('SHARING_DONE');
        return null;
      }

      Logger.log('Попытка ' + (i + 1) + '/' + maxAttempts + ' открыть таблицу упала (временная ошибка): ' + e.message);
      if (i < maxAttempts - 1) {
        Utilities.sleep(2000 * (i + 1));
      }
    }
  }

  Logger.log('Все ' + maxAttempts + ' попыток открыть таблицу упали. SHEET_ID сохранён, пропускаем запуск. Последняя ошибка: ' + lastError.message);
  throw new Error('Временная ошибка Google API при открытии таблицы. SHEET_ID сохранён, следующий запуск повторит попытку.');
}

function ensureSharing(sheetId, props) {
  if (props.getProperty('SHARING_DONE') === 'true') return;
  try {
    DriveApp.getFileById(sheetId).setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    props.setProperty('SHARING_DONE', 'true');
    Logger.log('Sharing настроен для таблицы ' + sheetId);
  } catch (e) {
    Logger.log('Не удалось настроить sharing (не критично, повторим в следующий раз): ' + e.message);
  }

            const normMark = (g, c) => {
                if (!g || !(g.d100 > 0) || !(c.clk > 0)) return null;
                const camp = c.epc * 100;
                const dev = Math.round((camp / g.d100 - 1) * 100);
                const cls = dev >= 30 ? 'text-green-400 border-green-500/40' : dev <= -30 ? 'text-red-400 border-red-500/40' : 'text-zinc-400 border-zinc-700';

                return <span className={`ml-1.5 px-1 rounded border text-[9px] cursor-help align-middle ${cls}`} title={t}>{dev >= 0 ? '+' : ''}{dev}% к норме</span>;

            const geoTitle = g => `рег/100 (CR клик→рега) ${f1(g.crReg)} · деп/100 (CR клик→деп) ${f1(g.crDep)} · рега→деп ${f1(g.reg2dep)}% · CPL ${money(g.cpl)} · CPD ${g.cpd ? money(g.cpd) : '—'} · CPC ${money(g.cpc)} · чек/деп ${money(g.payoutDep)} · доля гео ${Math.round(g.sharePct)}%`;

                                        <td className="w-full"></td>
                                    </tr>
                                ))}
                            </React.Fragment>
                        ))}
                    </tbody>

            );
        };

        const Dashboard = () => {
            const { useState, useEffect, useRef } = React;

            // Hotkeys: Q → Traffic Stats, W → Traffic Admin (works on any keyboard layout)
            useEffect(() => {
                const handler = (e) => {
                    if (e.ctrlKey || e.metaKey || e.altKey) return;
                    const t = e.target;
                    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
                    if (e.code === 'KeyQ' && location.pathname !== '/traffic.html' && location.pathname !== '/') {
                        location.href = '/traffic.html';
                    } else if (e.code === 'KeyW' && location.pathname !== '/traffic-admin.html') {
                        location.href = '/traffic-admin.html';
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);

            const [campaigns, setCampaigns] = useState(mockCampaignsData);
            const [isLoading, setIsLoading] = useState(true);
            const [searchFilter, setSearchFilter] = useState('');
            const [tasksOpen, setTasksOpen] = useState(false);
            const [alertsOpen, setAlertsOpen] = useState(false);
            const [activeAlerts, setActiveAlerts] = useState([]);
            const goToCampaign = (customName) => {
                setTasksOpen(false);
                setSearchFilter('');
                setTimeout(() => {
                    const el = document.querySelector(`[data-camp-name="${(window.CSS && CSS.escape) ? CSS.escape(customName) : customName.replace(/"/g, '\\"')}"]`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.style.transition = 'box-shadow 0.3s';
                        el.style.boxShadow = '0 0 0 2px rgb(249 115 22)';
                        setTimeout(() => { el.style.boxShadow = ''; }, 2200);
                    }
                }, 120);
            };
            const [notesOpen, setNotesOpen] = useState(false);
            const [notesText, setNotesText] = useState('');
            const [notesUpdatedAt, setNotesUpdatedAt] = useState('');
            const [notesLoading, setNotesLoading] = useState(false);
            const [notesSaving, setNotesSaving] = useState(false);
            const notesSaveTimer = useRef(null);
            const lastSavedNotes = useRef('');

            const fetchAdminNotes = useCallback(async () => {
                setNotesLoading(true);
                try {
                    const r = await fetch('/api/traffic-admin/notes', { cache: 'no-store' });
                    const j = await r.json();
                    setNotesText(j.text || '');
                    lastSavedNotes.current = j.text || '';
                    setNotesUpdatedAt(j.updatedAt || '');
                } catch (e) {
                    console.error('Failed to load notes', e);
                } finally {
                    setNotesLoading(false);
                }
            }, []);

            const saveAdminNotes = useCallback(async (val) => {
                if (val === lastSavedNotes.current) return;
                setNotesSaving(true);
                try {
                    const r = await fetch('/api/traffic-admin/notes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: val }),
                        keepalive: true

                                                        </button><div className="hidden group-hover/tt:block absolute left-0 top-full mt-1.5 z-40 w-64 bg-zinc-950 border border-zinc-700 rounded-lg p-2.5 text-[11px] font-normal normal-case tracking-normal text-zinc-300 leading-relaxed shadow-xl text-left"><b className="text-zinc-100">Скрипт для таблицы</b><br/>1. Google Ads → Инструменты → Скрипты → «+».<br/>2. Вставь код → «Запустить».<br/>3. Расписание: <b>Hourly</b> (каждый час).<br/>4. Из логов скопируй ссылку на таблицу → вставь ниже.</div></span>
                                                        <span className="relative group/tt inline-flex"><button onClick={copyOciReceiver} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded text-xs transition-colors flex items-center gap-1.5 border border-zinc-700/50" title="Приёмник (Расширения -> Apps Script -> Deploy)">
                                                            {copiedOciR ? <><i className="fas fa-check text-green-500"></i> Скоп.</> : <><i className="far fa-copy"></i> Приёмник</>}
                                                        </button><div className="hidden group-hover/tt:block absolute left-0 top-full mt-1.5 z-40 w-64 bg-zinc-950 border border-zinc-700 rounded-lg p-2.5 text-[11px] font-normal normal-case tracking-normal text-zinc-300 leading-relaxed shadow-xl text-left"><b className="text-zinc-100">Приёмник</b><br/>1. Открой созданную таблицу → Расширения → Apps Script.<br/>2. Вставь код → «Развернуть» → «Веб-приложение» (выполнять: от меня, доступ: все).<br/>3. Скопируй web-app ссылку → вставь ниже.</div></span>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                <p className="text-xs text-zinc-400 mb-3 ml-7">
                                                    Скопируйте этот скрипт и вставьте его в раздел <b>"Инструменты и настройки" &gt; "Скрипты"</b> в вашем кабинете Google Ads.
                                                </p>
                                                <div className="ml-7 relative group">
                                                    <div className="absolute right-2 top-2 z-10 flex items-center gap-2">
                                                        <button onClick={copyScriptNew} className="bg-green-900/40 hover:bg-green-800/60 text-green-300 px-3 py-1.5 rounded text-xs transition-colors flex items-center gap-2 border border-green-800/50" title="Копировать расширенный скрипт (ключи + заголовки)">
                                                            {copiedNew ? <><i className="fas fa-check text-green-500"></i> Скопировано</> : <><i className="far fa-copy"></i> NEW</>}
                                                        </button>
                                                    </div>
                                                    <pre className="bg-zinc-900 border border-zinc-800 p-4 rounded-lg text-[10px] text-zinc-300 font-mono overflow-x-auto h-32 custom-scrollbar">
                                                        {GOOGLE_ADS_SCRIPT}
                                                    </pre>
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="bg-purple-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">2</span>
                                            <h3 className="text-sm font-bold text-zinc-200">Привязка данных</h3>
                                        </div>

                                        <form onSubmit={handleSaveCampaignLink} className="ml-7 space-y-4">
                                            <div className="relative">
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Название кампании</label>
                                                <input
                                                    type="text"
                                                    value={newCampName}
                                                    onChange={e => setNewCampName(e.target.value)}
                                                    onFocus={() => setDropdownOpen(true)}
                                                    onBlur={() => setTimeout(() => setDropdownOpen(false), 200)}
                                                    placeholder="Выберите из списка или введите вручную"
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                                {dropdownOpen && (
                                                    <div className="absolute z-50 w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-xl max-h-48 overflow-y-auto custom-scrollbar">
                                                        {gridCampaigns.length > 0 ? (
                                                            <>
                                                                {gridCampaigns
                                                                    .filter(name => name.toLowerCase().includes(newCampName.toLowerCase()))
                                                                    .map((name, i) => (
                                                                        <div
                                                                            key={i}
                                                                            className="px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white cursor-pointer transition-colors"
                                                                            onMouseDown={() => {
                                                                                setNewCampName(name);
                                                                                setDropdownOpen(false);
                                                                            }}
                                                                        >
                                                                            {name}
                                                                        </div>
                                                                    ))}
                                                                {gridCampaigns.filter(name => name.toLowerCase().includes(newCampName.toLowerCase())).length === 0 && (
                                                                    <div className="px-4 py-2 text-sm text-zinc-500 italic">Нет совпадений</div>
                                                                )}
                                                            </>
                                                        ) : (
                                                            <div className="px-4 py-3 pb-4 text-sm flex flex-col items-center justify-center text-zinc-500 gap-2">
                                                                <i className="fas fa-ghost text-lg opacity-50 mb-1 mt-2"></i>
                                                                <span className="font-bold">Список пуст</span>
                                                                <span className="text-[10px] text-zinc-600 text-center leading-tight">Сначала добавьте кампании<br />в Chessboard</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                <p className="text-[10px] text-zinc-500 mt-1">
                                                    Связывает эту таблицу с кампанией из Chessboard.
                                                </p>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Ссылка на Google Таблицу</label>
                                                <input
                                                    type="url"
                                                    value={newCampUrl}
                                                    onChange={e => setNewCampUrl(e.target.value)}
                                                    placeholder="https://docs.google.com/spreadsheets/d/..."
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                                <p className="text-[10px] text-zinc-500 mt-1">
                                                    Вставьте ссылку на Google Таблицу, которую сгенерировал скрипт.
                                                </p>
                                            </div>

                                            {addMode === 'dg' && (
                                                <div>
                                                    <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Web-app ссылка приёмника</label>
                                                    <input
                                                        type="url"
                                                        value={newCampWebApp}
                                                        onChange={e => setNewCampWebApp(e.target.value)}
                                                        placeholder="https://script.google.com/macros/s/.../exec"
                                                        className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                    />
                                                    <p className="text-[10px] text-zinc-500 mt-1">
                                                        Ссылка из деплоя приёмника (Apps Script → Веб-приложение). Сервер шлёт сюда конверсии через прокси.
                                                    </p>
                                                </div>
                                            )}

                                            <div>
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Сайт (необязательно)</label>
                                                <input
                                                    type="url"
                                                    value={newCampSiteUrl}
                                                    onChange={e => setNewCampSiteUrl(e.target.value)}
                                                    placeholder="https://example.com"
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                            </div>

                                            <div className="pt-4 flex justify-end gap-3">
                                                <button
                                                    type="button"
                                                    onClick={() => setIsAddModalOpen(false)}
                                                    className="px-4 py-2 text-xs font-bold text-zinc-400 hover:text-white transition-colors"
                                                >
                                                    ОТМЕНА
                                                </button>
                                                <button
                                                    type="submit"
                                                    className="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 text-xs font-bold rounded shadow-lg transition-colors flex items-center gap-2"
                                                >
                                                    <i className="fas fa-save"></i>
                                                    СОХРАНИТЬ ПРИВЯЗКУ
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="h-8 border-t border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-10 text-[10px] text-zinc-500">
                        <div className="flex items-center gap-4">
                            <div>
                                Синхронизация данных: <span className="text-green-500">ONLINE</span>
                            </div>
                            <div className="border-l border-zinc-800 pl-4">
                                Последнее глобальное обновление: <span className="text-zinc-300 font-mono">{lastSyncTime}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {(() => {
                                const t = filteredCampaigns.filter(c => c.customStatus !== 'ban').reduce((a, c) => {
                                    a.imp += c.stats?.today?.impressions || 0;
                                    a.clicks += c.stats?.today?.clicks || 0;
                                    a.cost += c.stats?.today?.cost || 0;
                                    return a;
                                }, { imp: 0, clicks: 0, cost: 0 });
                                return (
                                    <span className="flex items-center gap-2 border-r border-zinc-800 pr-4 text-xs">
                                        <span className="text-zinc-500">Сегодня:</span>
                                        <span className="text-blue-400 font-bold"><i className="far fa-eye mr-0.5"></i>{formatNumber(t.imp)}</span>
                                        <span className="text-purple-400 font-bold"><i className="fas fa-mouse-pointer mr-0.5"></i>{formatNumber(t.clicks)}</span>
                                        <span className="text-red-400 font-bold"><i className="fas fa-dollar-sign mr-0.5"></i>{t.cost.toFixed(2)}</span>
                                    </span>
                                );
                            })()}
                            <span className="uppercase tracking-widest">Кампаний: {filteredCampaigns.length}</span>
                            <span className="uppercase tracking-widest text-purple-400/60"><i className="fas fa-shield-alt mr-1"></i>ADMIN</span>
                        </div>
                    </footer>

                    {analyticsOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-4" onClick={() => setAnalyticsOpen(false)}>
                            <div className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
                                    <div className="flex items-center gap-2">
                                        <i className="fas fa-chart-bar text-purple-400"></i>
                                        <h3 className="text-sm font-bold text-zinc-200 uppercase tracking-wider">{
                                            analyticsMode === 'saved' ? 'Аналитика (сохранённая)'
                                            : analyticsMode === 'yesterday' ? 'Аналитика за вчера'
                                            : 'Аналитика за сегодня'
                                        }</h3>
                                        {analyticsGeneratedAt && (
                                            <span className="text-[10px] text-zinc-500">
                                                {analyticsMode === 'saved' ? 'снимок: ' : 'сформировано: '}
                                                {new Date(analyticsGeneratedAt).toLocaleString('ru-RU')}
                                            </span>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-2 relative">
                                        <div className="relative">
                                            <button
                                                type="button"
                                                onClick={() => { if (!analyticsPickerOpen) fetchAnalyticsFilesList(); setAnalyticsPickerOpen(v => !v); }}
                                                title="Выбрать дату аналитики"
                                                className="px-2.5 py-1 rounded border border-zinc-700 text-zinc-300 hover:text-purple-400 hover:border-purple-500 transition-colors text-xs flex items-center gap-1.5">
                                                <i className="far fa-calendar-alt"></i>
                                                <span>{analyticsButtonLabel}</span>
                                                <i className={`fas fa-chevron-down text-[9px] transition-transform ${analyticsPickerOpen ? 'rotate-180' : ''}`}></i>
                                            </button>
                                            {analyticsPickerOpen && (
                                                <div className="absolute top-9 right-0 z-[110] bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl py-1 w-60 max-h-[60vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                                    <button
                                                        type="button"
                                                        onClick={() => pickAnalyticsItem({ kind: 'live-today' })}
                                                        className={`w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 hover:bg-zinc-800 transition-colors ${analyticsMode === 'today' ? 'text-purple-400 bg-zinc-800/60' : 'text-zinc-300'}`}>
                                                        <i className="fas fa-bolt text-[10px] w-3"></i>
                                                        <span>Сегодня (LIVE)</span>
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={() => pickAnalyticsItem({ kind: 'live-yesterday' })}
                                                        className={`w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 hover:bg-zinc-800 transition-colors ${analyticsMode === 'yesterday' ? 'text-purple-400 bg-zinc-800/60' : 'text-zinc-300'}`}>
                                                        <i className="far fa-clock text-[10px] w-3"></i>
                                                        <span>Вчера (snapshot)</span>
                                                    </button>
                                                    <div className="border-t border-zinc-800 my-1"></div>
                                                    <div className="px-3 py-1 text-[9px] uppercase tracking-wider text-zinc-500">Сохранённые</div>
                                                    {analyticsFiles.length === 0 && (
                                                        <div className="px-3 py-2 text-[11px] text-zinc-500 italic">Нет сохранённых файлов</div>
                                                    )}
                                                    {analyticsFiles.map(f => (
                                                        <button
                                                            key={f.date}
                                                            type="button"
                                                            onClick={() => pickAnalyticsItem({ kind: 'saved', date: f.date })}
                                                            className={`w-full text-left px-3 py-1.5 text-xs flex items-center justify-between gap-2 hover:bg-zinc-800 transition-colors ${analyticsMode === 'saved' && analyticsViewDate === f.date ? 'text-purple-400 bg-zinc-800/60' : 'text-zinc-300'}`}>
                                                            <span className="flex items-center gap-2">
                                                                <i className="far fa-file-alt text-[10px] w-3"></i>
                                                                <span className="font-mono">{fmtDateRu(f.date)}</span>
                                                            </span>
                                                            <span className="text-[9px] text-zinc-500">{Math.round((f.size || 0) / 1024)} KB</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <button
                                            type="button"
                                            onClick={refreshAnalytics}
                                            disabled={analyticsLoading}
                                            title="Обновить"
                                            className="px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-purple-400 hover:border-purple-500 transition-colors text-xs disabled:opacity-50">
                                            <i className={`fas fa-sync-alt ${analyticsLoading ? 'fa-spin' : ''}`}></i>
                                        </button>
                                        <button
                                            type="button"
                                            onClick={downloadAnalytics}
                                            disabled={!analyticsText || analyticsLoading}
                                            title="Скачать .txt"
                                            className="px-2.5 py-1 rounded border border-zinc-700 text-zinc-300 hover:text-green-400 hover:border-green-500 transition-colors text-xs flex items-center gap-1.5 disabled:opacity-50">
                                            <i className="fas fa-download"></i>
                                            <span>Скачать .txt</span>
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setAnalyticsOpen(false)}
                                            title="Закрыть"
                                            className="px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-red-400 hover:border-red-500 transition-colors text-xs">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-4">
                                    {analyticsLoading && (
                                        <div className="flex items-center justify-center py-10 text-zinc-500 text-sm">
                                            <i className="fas fa-spinner fa-spin mr-2"></i> Собираем данные...
                                        </div>
                                    )}
                                    {analyticsError && !analyticsLoading && (
                                        <div className="text-red-400 text-sm">Ошибка: {analyticsError}</div>
                                    )}
                                    {!analyticsLoading && !analyticsError && (
                                        <pre className="text-[11px] text-zinc-200 font-mono whitespace-pre leading-snug">{analyticsText}</pre>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {keitaroOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-2" onClick={() => setKeitaroOpen(false)}>
                            <div className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl w-full max-w-none h-[92vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
                                    <div className="flex items-center gap-2">
                                        <i className="fas fa-bullseye text-cyan-400"></i>
                                        <h3 className="text-sm font-bold text-zinc-200 uppercase tracking-wider">Keitaro</h3>
                                        <KeitaroExportButton />
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => setKeitaroOpen(false)}
                                        title="Закрыть"
                                        className="px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-red-400 hover:border-red-500 transition-colors text-xs">
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-hidden p-4">
                                    <KeitaroPanel />
                                </div>
                            </div>
                        </div>
                    )}

                    {breakdownOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-2" onClick={() => setBreakdownOpen(false)}>
                            <div className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl w-full max-w-none h-[92vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
                                    <div className="flex items-center gap-2">
                                        <i className="fas fa-chart-pie text-emerald-400"></i>
                                        <h3 className="text-sm font-bold text-zinc-200 uppercase tracking-wider">Разбор</h3>
                                    </div>
                                    <button type="button" onClick={() => setBreakdownOpen(false)} title="Закрыть" className="px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-red-400 hover:border-red-500 transition-colors text-xs"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="flex-1 overflow-hidden p-4">
                                    {breakdownOpen && <BreakdownPanel />}
                                </div>
                            </div>
                        </div>
                    )}

                    {notesOpen && (
                        <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-4" onClick={() => setNotesOpen(false)}>
                            <div className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
                                    <div className="flex items-center gap-2">
                                        <i className="fas fa-sticky-note text-yellow-400"></i>
                                        <h3 className="text-sm font-bold text-zinc-200 uppercase tracking-wider">Заметки</h3>
                                        {notesUpdatedAt && (
                                            <span className="text-[10px] text-zinc-500">
                                                обновлено: {new Date(notesUpdatedAt).toLocaleString('ru-RU')}
                                            </span>
                                        )}
                                        {notesSaving && (
                                            <span className="text-[10px] text-yellow-400 animate-pulse">
                                                <i className="fas fa-circle-notch fa-spin mr-1"></i>сохраняется
                                            </span>
                                        )}
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => setNotesOpen(false)}
                                        title="Закрыть"
                                        className="px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-red-400 hover:border-red-500 transition-colors text-xs">
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-auto p-4">
                                    {notesLoading ? (
                                        <div className="flex items-center justify-center py-10 text-zinc-500 text-sm">
                                            <i className="fas fa-spinner fa-spin mr-2"></i> Загрузка...
                                        </div>
                                    ) : (
                                        <textarea
                                            value={notesText}
                                            onChange={handleNotesChange}
                                            placeholder="Идеи, мысли, чек-листы..."
                                            className="w-full h-[60vh] bg-zinc-950 border border-zinc-800 rounded p-3 text-[13px] text-zinc-200 font-mono leading-relaxed focus:outline-none focus:border-yellow-600 resize-none"
                                        />
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => <Dashboard />;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<><App /><SessionExpiredOverlay /></>);
    </script>
</body>

</html>
