<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Ops - Campaign Stats</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #09090b;
            /* Zinc 950 */
            color: #e4e4e7;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #18181b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        /* Smooth Accordion Animation */
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .accordion-content.expanded {
            max-height: 1000px;
            /* Arbitrary large number for max-height transition */
            opacity: 1;
        }

        /* Table styling */
        .queries-table th {
            position: sticky;
            top: 0;
            background-color: #18181b;
            z-index: 10;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#09090b',
                        panel: '#18181b',
                    }
                }
            }
        }
    </script>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- STATUS CONFIG ---
        const CAMPAIGN_STATUS = {
            ACTIVE: { label: 'АКТИВНА', color: 'text-green-400', bg: 'bg-green-500/10', border: 'border-green-500/20', icon: 'fa-play' },
            PAUSED: { label: 'ПАУЗА', color: 'text-zinc-400', bg: 'bg-zinc-500/10', border: 'border-zinc-500/20', icon: 'fa-pause' },
            LIMITED: { label: 'ОГРАНИЧЕНА', color: 'text-orange-400', bg: 'bg-orange-500/10', border: 'border-orange-500/20', icon: 'fa-exclamation-triangle' },
            REMOVED: { label: 'УДАЛЕНА', color: 'text-red-400', bg: 'bg-red-500/10', border: 'border-red-500/20', icon: 'fa-trash' }
        };

        // --- MOCK DATA (Имитация ответа от твоего Google Ads скрипта) ---
        const mockCampaignsData = [];

        // --- COMPONENTS ---

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        };

        const formatNumber = (val) => {
            return new Intl.NumberFormat('ru-RU').format(val);
        };

        const CampaignRow = ({ data, onRefresh, index, onDragStart, onDragEnter, onDragEnd, isDraggedOver, isDragged }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            
            const [comment, setComment] = useState(data.comment || '');
            const [isSavingComment, setIsSavingComment] = useState(false);

            const hasQueries = data.queries && data.queries.length > 0;
            const statusInfo = CAMPAIGN_STATUS[data.status] || CAMPAIGN_STATUS.PAUSED;

            const handleDelete = async (e) => {
                e.stopPropagation();
                if (!confirm(`Удалить кампанию "${data.customName}"?`)) return;
                setIsDeleting(true);
                try {
                    const res = await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, { method: 'DELETE' });
                    if (res.ok) {
                        onRefresh();
                    } else {
                        alert('Ошибка удаления. Возможно, кампания уже удалена.');
                        setIsDeleting(false);
                    }
                } catch(err) {
                    alert('Ошибка сети при удалении');
                    setIsDeleting(false);
                }
            };

            const handleCommentBlur = async () => {
                if (comment === (data.comment || '')) return;
                setIsSavingComment(true);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment })
                    });
                } catch(e) {
                    console.error('Failed to save comment', e);
                } finally {
                    setIsSavingComment(false);
                }
            };

            const handleRefresh = async (e) => {
                e.stopPropagation();
                if (isRefreshing) return;
                setIsRefreshing(true);
                if (onRefresh) {
                    await onRefresh(data.name);
                }
                setIsRefreshing(false);
            };

            return (
                <div 
                    className={`flex flex-col border-b transition-all duration-200 group ${
                        isDragged ? 'opacity-20 scale-[0.98] grayscale' : ''
                    } ${
                        isDraggedOver ? 'border-t-2 border-t-purple-500 shadow-[0_-8px_15px_-5px_rgba(168,85,247,0.4)] bg-zinc-900/60 relative z-10' : 'border-zinc-800/50 hover:bg-zinc-900/30'
                    }`}
                    onMouseEnter={() => { if (onDragEnter) onDragEnter(index); }}
                >
                    <div className="flex items-center p-3 relative">
                        {/* Drag Handle — mousedown triggers drag mode */}
                        <div 
                            className="w-6 h-8 flex-shrink-0 flex items-center justify-center cursor-grab active:cursor-grabbing text-zinc-600 hover:text-zinc-200 transition-colors mr-1 select-none" 
                            title="Перетащите для перемещения"
                            onMouseDown={(e) => {
                                e.preventDefault();
                                if (onDragStart) onDragStart(index);
                            }}
                        >
                            <i className="fas fa-grip-vertical text-[11px] pointer-events-none"></i>
                        </div>
                        {/* Expand/Collapse Chevron */}
                        <div className="w-5 flex-shrink-0 flex items-center justify-center">
                            {hasQueries && (
                                <button
                                    onClick={() => setIsExpanded(!isExpanded)}
                                    className="w-6 h-6 rounded flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-colors"
                                >
                                    <i className={`fas fa-chevron-${isExpanded ? 'down' : 'right'} text-[10px]`}></i>
                                </button>
                            )}
                        </div>

                        {/* 1. Название */}
                        <div className="flex-1 min-w-0 pr-4">
                            <div className="flex items-center gap-3 mb-1">
                                <h3 className="font-bold text-sm text-zinc-100 truncate">{data.customName}</h3>
                                <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border flex items-center gap-1.5 ${statusInfo.bg} ${statusInfo.color} ${statusInfo.border}`}>
                                    <i className={`fas ${statusInfo.icon} text-[8px]`}></i>
                                    {statusInfo.label}
                                </span>
                                {data.url && (
                                    <button 
                                        onClick={(e) => {
                                            navigator.clipboard.writeText(data.url);
                                            const icon = e.currentTarget.querySelector('i');
                                            icon.className = 'fas fa-check text-green-400 text-[10px]';
                                            setTimeout(() => icon.className = 'fas fa-link text-[10px]', 1500);
                                        }}
                                        className="text-zinc-500 hover:text-white transition-colors"
                                        title="Скопировать ссылку на таблицу"
                                    >
                                        <i className="fas fa-link text-[10px]"></i>
                                    </button>
                                )}
                            </div>
                            <div className="text-[10px] text-zinc-500 flex items-center gap-2">
                                <span title="Системное имя в Google Ads" className="truncate max-w-[200px] inline-block">{data.name}</span>
                                <span>•</span>
                                <span className="flex items-center gap-1">
                                    <i className="fas fa-sync-alt text-[9px]"></i> {data.lastUpdated}
                                </span>
                                {data.isStale && (
                                    <span className="flex items-center gap-1 text-yellow-400" title="⚠️ Таблица Google не обновлялась больше 80 минут. Проверьте, работает ли скрипт в Google Ads.">
                                        <i className="fas fa-exclamation-triangle text-[10px]"></i>
                                        <span className="text-[9px]">Таблица не обновилась</span>
                                    </span>
                                )}
                                {data.impressionsStale && !data.isStale && (
                                    <span className="flex items-center gap-1 text-orange-400" title="⚠️ Показы за сегодня не менялись больше 3 часов. Возможно, скрипт отключился или кампания остановлена.">
                                        <i className="fas fa-exclamation-circle text-[10px]"></i>
                                        <span className="text-[9px]">Показы не меняются</span>
                                    </span>
                                )}
                                <button onClick={handleRefresh} className={`hover:text-purple-400 transition-colors opacity-0 group-hover:opacity-100 ml-1 ${isRefreshing ? 'animate-spin text-blue-400 opacity-100' : ''}`} title="Обновить данные">
                                    <i className="fas fa-redo text-[9px]"></i>
                                </button>
                                <button onClick={handleDelete} className={`hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 ml-2 text-zinc-600 ${isDeleting ? 'animate-pulse text-red-500 opacity-100' : ''}`} title="Удалить кампанию" disabled={isDeleting}>
                                    <i className="fas fa-trash text-[9px]"></i>
                                </button>
                                
                                <div className={`ml-4 flex items-center gap-1.5 transition-opacity ${comment ? 'opacity-100' : 'opacity-0'} group-hover:opacity-100 focus-within:opacity-100 relative`}>
                                    <i className="fas fa-pen text-[8px] text-zinc-600"></i>
                                    <input 
                                        type="text" 
                                        value={comment}
                                        onChange={(e) => setComment(e.target.value)}
                                        onBlur={handleCommentBlur}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') e.target.blur();
                                        }}
                                        placeholder="Заметка..."
                                        className="bg-transparent text-[10px] text-zinc-400 placeholder-zinc-700 outline-none w-40 focus:text-zinc-200 focus:border-b focus:border-zinc-700 border-b border-transparent pb-[1px] transition-colors"
                                    />
                                    {isSavingComment && <i className="fas fa-spinner fa-spin text-[8px] text-purple-400 absolute -right-3"></i>}
                                </div>
                            </div>
                        </div>

                        {/* Stats: Today */}
                        <div className="w-56 flex-shrink-0 border-l border-zinc-800 pl-4">
                            <div className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Сегодня</div>
                            <div className="flex gap-3 text-xs">
                                <span className="text-blue-400" title="Показы"><i className="far fa-eye mr-1"></i>{formatNumber(data.stats.today.impressions)}</span>
                                <span className="text-purple-400" title="Клики"><i className="fas fa-mouse-pointer mr-1"></i>{formatNumber(data.stats.today.clicks)}</span>
                                <span className="text-red-400" title="Затраты"><i className="fas fa-dollar-sign mr-1"></i>{data.stats.today.cost.toFixed(2)}</span>
                            </div>
                        </div>

                        {/* Stats: All Time */}
                        <div className="w-56 flex-shrink-0 border-l border-zinc-800 pl-4">
                            <div className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Все время</div>
                            <div className="flex gap-3 text-xs">
                                <span className="text-zinc-300" title="Показы"><i className="far fa-eye mr-1"></i>{formatNumber(data.stats.allTime.impressions)}</span>
                                <span className="text-purple-500" title="Клики"><i className="fas fa-mouse-pointer mr-1"></i>{formatNumber(data.stats.allTime.clicks)}</span>
                                <span className="text-yellow-600" title="Затраты"><i className="fas fa-dollar-sign mr-1"></i>{data.stats.allTime.cost.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>

                    {/* EXPANDED CONTENT (Search Queries Table) */}
                    <div className={`accordion-content ${isExpanded ? 'expanded' : ''} bg-[#0c0c0e] border-t border-zinc-800/50`}>
                        <div className="p-4 pl-11">
                            <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-3">
                                Поисковые запросы (Сегодня)
                            </h4>

                            {!hasQueries ? (
                                <div className="text-xs text-zinc-600 italic">Данные по запросам отсутствуют или кампания не поисковая.</div>
                            ) : (
                                <div className="rounded border border-zinc-800 overflow-hidden max-h-[300px] overflow-y-auto">
                                    <table className="w-full text-left border-collapse queries-table">
                                        <thead>
                                            <tr className="text-[10px] uppercase tracking-wider text-zinc-500 border-b border-zinc-800">
                                                <th className="p-2 font-normal">Поисковый запрос</th>
                                                <th className="p-2 font-normal w-24 text-right">Показы</th>
                                                <th className="p-2 font-normal w-24 text-right">Клики</th>
                                                <th className="p-2 font-normal w-24 text-right">CPC</th>
                                                <th className="p-2 font-normal w-24 text-right">Затраты</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-xs text-zinc-300">
                                            {data.queries.map((q, idx) => {
                                                // Рассчитываем CPC на лету
                                                const cpc = q.clicks > 0 ? (q.cost / q.clicks).toFixed(2) : "0.00";
                                                return (
                                                    <tr key={q.id} className={`hover:bg-zinc-800/50 transition-colors ${idx !== data.queries.length - 1 ? 'border-b border-zinc-800/50' : ''}`}>
                                                        <td className="p-2 font-mono text-zinc-200">"{q.text}"</td>
                                                        <td className="p-2 text-right text-blue-400">{q.impressions}</td>
                                                        <td className="p-2 text-right text-purple-400">{q.clicks}</td>
                                                        <td className="p-2 text-right text-zinc-400">${cpc}</td>
                                                        <td className="p-2 text-right text-red-400 font-mono">${q.cost.toFixed(2)}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const GOOGLE_ADS_SCRIPT = `function main() {
  var account = AdsApp.currentAccount();
  var accountName = account.getName();
  var accountId = account.getCustomerId();

  // 1. Создаем таблицу (или открываем ту, что создали вчера/ранее)
  var spreadsheet = getOrCreateSpreadsheet(accountName, accountId);

  // 2. Собираем показы и затраты (Общие и за Сегодня)
  exportCampaignStats(spreadsheet);

  // 3. Собираем реальные поисковые запросы за сегодня
  exportSearchTermsToday(spreadsheet);

  // 4. Записываем время последнего обновления
  var metaSheet = getOrCreateSheet(spreadsheet, 'Метаданные');
  metaSheet.clear();
  metaSheet.appendRow(['Ключ', 'Значение']);
  metaSheet.appendRow(['Последнее обновление', new Date().toISOString()]);

  Logger.log('Готово! Ссылка на таблицу: ' + spreadsheet.getUrl());
}

// Функция для выгрузки статистики кампаний (Показы и Затраты)
function exportCampaignStats(spreadsheet) {
  var sheet = getOrCreateSheet(spreadsheet, 'Статистика_Кампаний');
  sheet.clear();
  sheet.appendRow(['Кампания', 'Статус', 'Период', 'Показы', 'Клики', 'Затраты']);

  // А) Запрашиваем данные за СЕГОДНЯ
  var queryToday = "SELECT campaign.name, campaign.status, metrics.impressions, metrics.clicks, metrics.cost_micros " +
                   "FROM campaign WHERE segments.date DURING TODAY";
  var rowsToday = AdsApp.search(queryToday);
  while (rowsToday.hasNext()) {
    var row = rowsToday.next();
    // Делим costMicros на 1 000 000, чтобы получить нормальную валюту
    sheet.appendRow([row.campaign.name, row.campaign.status, 'Сегодня', row.metrics.impressions, row.metrics.clicks, row.metrics.costMicros / 1000000]);
  }

  // Б) Запрашиваем ОБЩИЕ данные (за всё время работы кампаний)
  var queryTotal = "SELECT campaign.name, campaign.status, metrics.impressions, metrics.clicks, metrics.cost_micros " +
                   "FROM campaign";
  var rowsTotal = AdsApp.search(queryTotal);
  while (rowsTotal.hasNext()) {
    var row = rowsTotal.next();
    sheet.appendRow([row.campaign.name, row.campaign.status, 'Все время', row.metrics.impressions, row.metrics.clicks, row.metrics.costMicros / 1000000]);
  }
}

// Функция для выгрузки Поисковых запросов за сегодня
function exportSearchTermsToday(spreadsheet) {
  var sheet = getOrCreateSheet(spreadsheet, 'Поисковые_запросы_Сегодня');
  sheet.clear();
  sheet.appendRow(['Поисковый запрос', 'Кампания', 'Группа объявлений', 'Показы', 'Клики', 'Затраты']);

  // Запрашиваем фразы только за СЕГОДНЯ и сортируем по количеству показов
  var query = "SELECT search_term_view.search_term, campaign.name, ad_group.name, metrics.impressions, metrics.clicks, metrics.cost_micros " +
              "FROM search_term_view " +
              "WHERE segments.date DURING TODAY " +
              "ORDER BY metrics.impressions DESC";

  var rows = AdsApp.search(query);
  while (rows.hasNext()) {
    var row = rows.next();
    sheet.appendRow([
      row.searchTermView.searchTerm,
      row.campaign.name,
      row.adGroup.name,
      row.metrics.impressions,
      row.metrics.clicks,
      row.metrics.costMicros / 1000000
    ]);
  }
}

// Вспомогательная функция: создает лист, если его нет
function getOrCreateSheet(spreadsheet, sheetName) {
  var sheet = spreadsheet.getSheetByName(sheetName);
  if (!sheet) {
    sheet = spreadsheet.insertSheet(sheetName);
  }
  return sheet;
}

// Вспомогательная функция: создает публичную таблицу
function getOrCreateSpreadsheet(accountName, accountId) {
  var props = PropertiesService.getScriptProperties();
  var sheetId = props.getProperty('MY_NEW_STATS_SHEET');

  if (sheetId) {
    try {
      return SpreadsheetApp.openById(sheetId);
    } catch (e) {
      Logger.log('Не удалось открыть старую таблицу, создаем новую.');
    }
  }

  var spreadsheet = SpreadsheetApp.create('Статистика Показов и Запросов - ' + accountName);
  sheetId = spreadsheet.getId();
  props.setProperty('MY_NEW_STATS_SHEET', sheetId);
  DriveApp.getFileById(sheetId).setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
  return spreadsheet;
}`;

        // --- MAIN APP ---
        const GOOGLE_ADS_SCRIPT_X2 = `function main() {
  var account = AdsApp.currentAccount();
  var accountId = account.getCustomerId();
  var accountName = account.getName();
  var currency = account.getCurrencyCode();

// =======================================================
// ЧАСТЬ 1: СТОРОННИЙ СЕРВИС (Объявления и Инфо)
// =======================================================
function runThirdPartyService(spreadsheet, accountId, accountName, currency) {
  var now = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd HH:mm:ss');
  var today = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd');
  var yesterday = Utilities.formatDate(new Date(Date.now() - 86400000), 'UTC', 'yyyy-MM-dd');

  var infoSheet = getOrCreateSheet(spreadsheet, 'Info');
  infoSheet.clear();
  infoSheet.appendRow(['account_id', 'account_name', 'currency', 'updated_at', 'script_run_at']);
  infoSheet.appendRow([accountId, accountName, currency, now, now]);

  var adsSheet = getOrCreateSheet(spreadsheet, 'Ads');
  adsSheet.clear();
  adsSheet.appendRow([
    'campaign_name', 'ad_group_name', 'ad_headline', 'ad_type', 'ad_id',
    'status', 'cost', 'currency', 'clicks', 'impressions', 'conversions', 'avg_cpc', 'date', 'period'
  ]);

  var periods = [
    { label: 'today', apiLabel: 'TODAY', date: today },
    { label: 'yesterday', apiLabel: 'YESTERDAY', date: yesterday },
    { label: 'last_7_days', apiLabel: 'LAST_7_DAYS', date: today },
    { label: 'last_14_days', apiLabel: 'LAST_14_DAYS', date: today },
    { label: 'last_30_days', apiLabel: 'LAST_30_DAYS', date: today },
    { label: 'this_month', apiLabel: 'THIS_MONTH', date: today },
    { label: 'last_month', apiLabel: 'LAST_MONTH', date: today },
    { label: 'this_week_mon_today', apiLabel: 'THIS_WEEK_MON_TODAY', date: today },
    { label: 'last_week_sun_sat', apiLabel: 'LAST_WEEK_SUN_SAT', date: today },
    { label: 'last_business_week', apiLabel: 'LAST_BUSINESS_WEEK', date: today }
  ];

  var existingData = new Set();
  var totalAdded = 0;
  for (var i = 0; i < periods.length; i++) {
    var added = addDataForPeriod(periods[i], adsSheet, existingData, currency);
    totalAdded += added;
  }
}

function addDataForPeriod(periodConfig, adsSheet, existingData, currency) {
  var apiLabel = periodConfig.apiLabel;
  var period = periodConfig.label;
  var dateStr = periodConfig.date;
  var adIterator = AdsApp.ads().forDateRange(apiLabel).get();
  var added = 0;

  while (adIterator.hasNext()) {
    var ad = adIterator.next();
    var adType = getAdType(ad);
    var headline = getAdHeadline(ad);
    var adId = getAdId(ad);
    var stats = ad.getStatsFor(apiLabel);
    var campaignName = ad.getCampaign().getName();
    var adGroupName = ad.getAdGroup().getName();
    var status = ad.isEnabled() ? 'enabled' : 'paused';
    
    var key = dateStr + '|' + period + '|' + campaignName + '|' + adGroupName + '|' + adId;
    
    if (!existingData.has(key)) {
      adsSheet.appendRow([
        campaignName, adGroupName, headline, adType, adId, status,
        stats.getCost(), currency, stats.getClicks(), stats.getImpressions(),
        stats.getConversions(), stats.getAverageCpc(), dateStr, period
      ]);
      existingData.add(key);
      added++;
    }
  }
  return added;
}

function getAdId(ad) {
  try {
    var fullId = ad.getId().toString();
    var parts = fullId.split('/');
    return parts.length > 1 ? parts[parts.length - 1] : fullId;
  } catch (e) { return ''; }
}

function getAdType(ad) {
  if (ad.isType().responsiveSearchAd()) return 'RSA';
  if (ad.isType().expandedTextAd()) return 'ETA';
  if (ad.isType().imageAd()) return 'IMAGE';
  if (ad.isType().videoAd()) return 'VIDEO';
  return 'OTHER';
}

function getAdHeadline(ad) {
  if (ad.isType().responsiveSearchAd()) {
    var headlines = ad.asType().responsiveSearchAd().getHeadlines();
    if (headlines && headlines.length > 0) {
      var allHeadlines = [];
      for (var i = 0; i < Math.min(headlines.length, 5); i++) {
        if (headlines[i].text) allHeadlines.push(headlines[i].text);
      }
      return allHeadlines.join(' | ') || '';
    }
  }
  try { return ad.getHeadline() || ''; } catch (e) { return ''; }
}

function getOrCreateSheet(spreadsheet, sheetName) {
  var sheet = spreadsheet.getSheetByName(sheetName);
  if (!sheet) {
    sheet = spreadsheet.insertSheet(sheetName);
  }
  return sheet;
}

function getOrCreateSpreadsheet(accountName, accountId) {
  var props = PropertiesService.getScriptProperties();
  var sheetId = props.getProperty('SHEET_ID');

  if (sheetId) {
    try {
      var existing = SpreadsheetApp.openById(sheetId);
      DriveApp.getFileById(sheetId).setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
      return existing;
    } catch (e) {
      Logger.log('Не удалось открыть таблицу, создаём новую');
    }
  }

  var spreadsheet = SpreadsheetApp.create('Google Ads Data - ' + accountName + ' (' + accountId + ')');
  sheetId = spreadsheet.getId();
  props.setProperty('SHEET_ID', sheetId);

  DriveApp.getFileById(sheetId).setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
  
  return spreadsheet;
}

                            ) : (
                                filteredCampaigns.map((camp, idx) => (
                                    <CampaignRow 
                                        key={camp.id} 
                                        data={camp} 
                                        onRefresh={fetchDashboardData}
                                        index={idx}
                                        onDragStart={!searchFilter ? handleDragStart : null}
                                        onDragEnter={!searchFilter ? handleDragEnter : null}
                                        isDraggedOver={dragOverItemIndex === idx && draggedItemIndex !== idx}
                                        isDragged={draggedItemIndex === idx}
                                    />
                                ))
                            )}
                        </div>
                    </main>

                    {/* Add Campaign Modal */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm p-4">
                            <div className="bg-zinc-950 border border-zinc-700/50 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                {/* Modal Header */}
                                <div className="px-6 py-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                            <i className="fas fa-plus text-purple-400"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-lg font-bold text-zinc-100 tracking-wide">Добавление кампании</h2>
                                            <p className="text-xs text-zinc-400">Настройка выгрузки из Google Ads</p>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setIsAddModalOpen(false)}
                                        className="text-zinc-500 hover:text-white transition-colors p-2"
                                    >
                                        <i className="fas fa-times text-lg"></i>
                                    </button>
                                </div>

                                {/* Modal Content - Scrollable */}
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1">

                                    {/* Step 1: Instructions & Script */}
                                    <div className="mb-8">
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className="bg-purple-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">1</span>
                                            <h3 className="text-sm font-bold text-zinc-200">Скрипт Google Ads</h3>
                                        </div>
                                        <p className="text-xs text-zinc-400 mb-3 ml-7">
                                            Скопируйте этот скрипт и вставьте его в раздел <b>"Инструменты и настройки" &gt; "Скрипты"</b> в вашем кабинете Google Ads. Он автоматически создаст Google Таблицу со статистикой.
                                        </p>
                                        <div className="ml-7 relative group">
                                            <div className="absolute right-2 top-2 z-10 flex gap-2">
                                                <button
                                                    onClick={copyScript}
                                                    className="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded text-xs transition-colors flex items-center gap-2 border border-zinc-700/50"
                                                    title="Копировать стандартный скрипт"
                                                >
                                                    {copied ? <><i className="fas fa-check text-green-500"></i> Скопировано</> : <><i className="far fa-copy"></i> Копировать</>}
                                                </button>
                                                <button
                                                    onClick={copyScriptX2}
                                                    className="bg-purple-900/40 hover:bg-purple-800/60 text-purple-300 px-3 py-1.5 rounded text-xs transition-colors flex items-center gap-2 border border-purple-800/50"
                                                    title="Копировать обновленный (x2) скрипт"
                                                >
                                                    {copiedX2 ? <><i className="fas fa-check text-green-500"></i> Скопировано</> : <><i className="far fa-copy"></i> x2</>}
                                                </button>
                                            </div>
                                            <pre className="bg-zinc-900 border border-zinc-800 p-4 rounded-lg text-[10px] text-zinc-300 font-mono overflow-x-auto h-32 custom-scrollbar">
                                                {GOOGLE_ADS_SCRIPT}
                                            </pre>
                                        </div>
                                    </div>

                                    {/* Step 2: Linking Form */}
                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="bg-purple-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">2</span>
                                            <h3 className="text-sm font-bold text-zinc-200">Привязка данных</h3>
                                        </div>

                                        <form onSubmit={handleSaveCampaignLink} className="ml-7 space-y-4">
                                            <div className="relative">
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Название кампании</label>
                                                <input
                                                    type="text"
                                                    value={newCampName}
                                                    onChange={e => setNewCampName(e.target.value)}
                                                    onFocus={() => setDropdownOpen(true)}
                                                    onBlur={() => setTimeout(() => setDropdownOpen(false), 200)}
                                                    placeholder="Выберите из списка или введите вручную"
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                                {dropdownOpen && (
                                                    <div className="absolute z-50 w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-xl max-h-48 overflow-y-auto custom-scrollbar">
                                                        {gridCampaigns.length > 0 ? (
                                                            <>
                                                                {gridCampaigns
                                                                    .filter(name => name.toLowerCase().includes(newCampName.toLowerCase()))
                                                                    .map((name, i) => (
                                                                        <div
                                                                            key={i}
                                                                            className="px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white cursor-pointer transition-colors"
                                                                            onMouseDown={() => {
                                                                                setNewCampName(name);
                                                                                setDropdownOpen(false);
                                                                            }}
                                                                        >
                                                                            {name}
                                                                        </div>
                                                                    ))}
                                                                {gridCampaigns.filter(name => name.toLowerCase().includes(newCampName.toLowerCase())).length === 0 && (
                                                                    <div className="px-4 py-2 text-sm text-zinc-500 italic">Нет совпадений</div>
                                                                )}
                                                            </>
                                                        ) : (
                                                            <div className="px-4 py-3 pb-4 text-sm flex flex-col items-center justify-center text-zinc-500 gap-2">
                                                                <i className="fas fa-ghost text-lg opacity-50 mb-1 mt-2"></i>
                                                                <span className="font-bold">Список пуст</span>
                                                                <span className="text-[10px] text-zinc-600 text-center leading-tight">Сначала добавьте кампании<br />в Chessboard</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                                <p className="text-[10px] text-zinc-500 mt-1">
                                                    Связывает эту таблицу с кампанией из Chessboard.
                                                </p>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Ссылка на Google Таблицу</label>
                                                <input
                                                    type="url"
                                                    value={newCampUrl}
                                                    onChange={e => setNewCampUrl(e.target.value)}
                                                    placeholder="https://docs.google.com/spreadsheets/d/..."
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                                <p className="text-[10px] text-zinc-500 mt-1">
                                                    Вставьте ссылку на Google Таблицу, которую сгенерировал скрипт.
                                                </p>
                                            </div>

                                            <div className="pt-4 flex justify-end gap-3">
                                                <button
                                                    type="button"
                                                    onClick={() => setIsAddModalOpen(false)}
                                                    className="px-4 py-2 text-xs font-bold text-zinc-400 hover:text-white transition-colors"
                                                >
                                                    ОТМЕНА
                                                </button>
                                                <button
                                                    type="submit"
                                                    className="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 text-xs font-bold rounded shadow-lg transition-colors flex items-center gap-2"
                                                >
                                                    <i className="fas fa-save"></i>
                                                    СОХРАНИТЬ ПРИВЯЗКУ
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}

                    {/* Status Footer */}
                    <footer className="h-8 border-t border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-10 text-[10px] text-zinc-500">
                        <div className="flex items-center gap-4">
                            <div>
                                Синхронизация данных: <span className="text-green-500">ONLINE</span>
                            </div>
                            <div className="border-l border-zinc-800 pl-4">
                                Последнее глобальное обновление: <span className="text-zinc-300 font-mono">{lastSyncTime}</span>
                            </div>
                        </div>
                        <div className="uppercase tracking-widest">
                            Показано кампаний: {filteredCampaigns.length}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
