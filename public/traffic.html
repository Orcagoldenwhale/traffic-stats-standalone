<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Ops - Campaign Stats</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b0e'/%3E%3Crect x='6' y='18' width='5' height='8' rx='1.5' fill='%2322d3ee'/%3E%3Crect x='13.5' y='12' width='5' height='14' rx='1.5' fill='%2322d3ee'/%3E%3Crect x='21' y='7' width='5' height='19' rx='1.5' fill='%2322d3ee'/%3E%3C/svg%3E">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        body {
            background-color: #09090b;
            /* Zinc 950 */
            color: #e4e4e7;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #18181b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        /* Smooth Accordion Animation */
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .accordion-content.expanded {
            max-height: 1000px;
            /* Arbitrary large number for max-height transition */
            opacity: 1;
        }

        /* Table styling */
        .queries-table th {
            position: sticky;
            top: 0;
            background-color: #18181b;
            z-index: 10;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#09090b',
                        panel: '#18181b',
                    }
                }
            }
        }
    </script>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col">
    <div id="root" class="h-full w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Session-expiry guard ---
        // If a request comes back 401 (dead session after a server restart or 12h TTL), do NOT swallow it:
        // surface a blocking overlay so edits are never lost silently. Unsaved text stays in the fields.
        let __authExpired = false;
        function flagAuthExpired() {
            if (__authExpired) return;
            __authExpired = true;
            window.dispatchEvent(new CustomEvent('auth-expired'));
        }

        // --- Flush pending autosaves before the tab closes/hides, so a debounced (800ms) note/comment
        // is never lost if the user closes the tab right after typing. Each row registers a flush fn here.
        const __dirtyFlushers = new Set();
        function __flushAllDirty() { __dirtyFlushers.forEach(f => { try { f(); } catch (e) {} }); }
        window.addEventListener('pagehide', __flushAllDirty);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') __flushAllDirty(); });

        function SessionExpiredOverlay() {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const h = () => setShow(true);
                window.addEventListener('auth-expired', h);
                return () => window.removeEventListener('auth-expired', h);
            }, []);
            if (!show) return null;
            return (
                <div style={{position:'fixed',inset:0,zIndex:99999,background:'rgba(0,0,0,0.85)',backdropFilter:'blur(2px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <div style={{maxWidth:'440px',margin:'16px',background:'#18181b',border:'1px solid #ef4444',borderRadius:'14px',padding:'28px',textAlign:'center',fontFamily:'sans-serif'}}>
                        <div style={{fontSize:'42px',marginBottom:'10px'}}>⚠️</div>
                        <div style={{fontSize:'17px',fontWeight:700,color:'#f87171',marginBottom:'10px'}}>Сессия истекла</div>
                        <div style={{fontSize:'13px',lineHeight:1.6,color:'#a1a1aa',marginBottom:'20px'}}>
                            Последние изменения <b style={{color:'#e4e4e7'}}>не сохранены</b>. Ваш текст остался в полях и не потерян.<br/>
                            Откройте вход <b style={{color:'#e4e4e7'}}>в новой вкладке</b>, войдите, вернитесь сюда и сохраните снова.
                        </div>
                        <a href="/login.html" target="_blank" rel="noopener" style={{display:'inline-block',background:'#ef4444',color:'#fff',padding:'11px 22px',borderRadius:'9px',fontSize:'14px',fontWeight:600,textDecoration:'none'}}>Войти заново</a>
                        <div style={{marginTop:'14px'}}>
                            <button onClick={() => window.location.reload()} style={{background:'none',border:'none',color:'#71717a',fontSize:'12px',cursor:'pointer',textDecoration:'underline'}}>Обновить страницу</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- CUSTOM STATUS CONFIG ---
        const CUSTOM_STATUSES = [
            { key: 'warmup', label: 'ПРОГРЕВ', color: 'text-orange-400', bg: 'bg-orange-500/10', border: 'border-orange-500/20', icon: 'fa-fire' },
            { key: 'verif', label: 'ВЕРИФ', color: 'text-blue-400', bg: 'bg-blue-500/10', border: 'border-blue-500/20', icon: 'fa-shield-alt' },
            { key: 'live', label: 'БОЕВОЙ', color: 'text-green-400', bg: 'bg-green-500/10', border: 'border-green-500/20', icon: 'fa-rocket' },
            { key: 'ban', label: 'БАН', color: 'text-red-400', bg: 'bg-red-500/10', border: 'border-red-500/20', icon: 'fa-ban' },
        ];
        const STATUS_MAP = Object.fromEntries(CUSTOM_STATUSES.map(s => [s.key, s]));
        const DEFAULT_STATUS = CUSTOM_STATUSES[0];

        // --- MOCK DATA (Имитация ответа от твоего Google Ads скрипта) ---
        const mockCampaignsData = [];

        // --- Clipboard helper (works over HTTP and HTTPS) ---
        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            return Promise.resolve();
        }

        // --- COMPONENTS ---

        const formatCurrency = (val) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        };

        const formatNumber = (val) => {
            return new Intl.NumberFormat('ru-RU').format(val);
        };

        const CampaignRow = ({ data, onRefresh, index, onDragStart, onDragEnter, onDragEnd, isDraggedOver, isDragged }) => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const [showMoveConfirm, setShowMoveConfirm] = useState(false);
            const [isMoving, setIsMoving] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [editName, setEditName] = useState(data.customName);
            const [editUrl, setEditUrl] = useState(data.url || '');
            const [editSiteUrl, setEditSiteUrl] = useState(data.siteUrl || '');
            const [isSavingEdit, setIsSavingEdit] = useState(false);
            
            const [comment, setComment] = useState(data.comment || '');
            const [isSavingComment, setIsSavingComment] = useState(false);
            const [showAlertPopup, setShowAlertPopup] = useState(false);
            const [alertValue, setAlertValue] = useState(data.costAlert || '');
            const [costAlert, setCostAlert] = useState(data.costAlert || 0);
            const [costAlertNote, setCostAlertNote] = useState(data.costAlertNote || '');
            const [campTask, setCampTask] = useState(data.campTask || '');
            const [showTaskPopup, setShowTaskPopup] = useState(false);
            const [taskInput, setTaskInput] = useState('');
            const [campNote, setCampNote] = useState(data.campNote || '');
            const [isSavingNote, setIsSavingNote] = useState(false);
            const [campTimer, setCampTimer] = useState(data.campTimer || 0);
            const [, forceUpdate] = useState(0);

            const handleSaveAlert = async () => {
                const val = parseFloat(alertValue) || 0;
                setCostAlert(val);
                setShowAlertPopup(false);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ costAlert: val, costAlertNote }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save alert', e); }
            };
            const handleDisableAlert = async () => {
                setCostAlert(0);
                setAlertValue('');
                setCostAlertNote('');
                setShowAlertPopup(false);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ costAlert: 0, costAlertNote: '' }), keepalive: true
                    });
                } catch (e) { console.error('Failed to disable alert', e); }
            };
            const handleSaveTask = async (text) => {
                setCampTask(text);
                setShowTaskPopup(false);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campTask: text }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save task', e); }
            };
            const TIMER_DURATION = 24 * 60 * 60 * 1000;
            const timerActive = campTimer > 0 && (Date.now() - campTimer) < TIMER_DURATION;
            const timerProgress = timerActive ? Math.max(0, 1 - (Date.now() - campTimer) / TIMER_DURATION) : 0;

            useEffect(() => {
                if (!timerActive) return;
                const iv = setInterval(() => forceUpdate(n => n + 1), 30000);
                return () => clearInterval(iv);
            }, [timerActive]);

            const handleToggleTimer = async () => {
                const newVal = timerActive ? 0 : Date.now();
                setCampTimer(newVal);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campTimer: newVal }), keepalive: true
                    });
                } catch (e) { console.error('Failed to save timer', e); }
            };

            const commentTimer = useRef(null);
            const lastSavedComment = useRef(data.comment || '');

            const hasQueries = data.queries && data.queries.length > 0;
            const hasKeywords = data.keywords && data.keywords.length > 0;
            const hasAdTexts = data.adTexts && data.adTexts.length > 0;
            const hasAnyExpand = hasQueries || hasKeywords || hasAdTexts;
            const [activeTab, setActiveTab] = useState(hasQueries ? 'queries' : hasKeywords ? 'keywords' : 'adTexts');
            const [customStatus, setCustomStatus] = useState(data.customStatus || 'warmup');
            const [showStatusPicker, setShowStatusPicker] = useState(false);
            const statusInfo = STATUS_MAP[customStatus] || DEFAULT_STATUS;

            const [primaryKeyword, setPrimaryKeyword] = useState(data.primaryKeyword || '');
            React.useEffect(() => { setPrimaryKeyword(data.primaryKeyword || ''); }, [data.primaryKeyword]);

            const handlePrimaryKeywordToggle = async (kwText) => {
                const next = (primaryKeyword || '').trim().toLowerCase() === (kwText || '').trim().toLowerCase() ? '' : kwText;
                setPrimaryKeyword(next);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ primaryKeyword: next }),
                        keepalive: true
                    });
                } catch (e) { console.error('Failed to save primary keyword', e); }
            };

            const handleStatusChange = async (newKey) => {
                setCustomStatus(newKey);
                setShowStatusPicker(false);
                try {
                    await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customStatus: newKey }),
                        keepalive: true
                    });
                } catch (e) { console.error('Failed to save status', e); }
            };

            const saveComment = useCallback(async (value) => {
                if (value === lastSavedComment.current) return;
                setIsSavingComment(true);
                try {
                    const res = await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment: value }),
                        keepalive: true
                    });
                    if (res.ok) lastSavedComment.current = value;
                    else if (res.status === 401) flagAuthExpired();
                } catch(e) {
                    console.error('Failed to save comment', e);
                } finally {
                    setIsSavingComment(false);
                }
            }, [data.customName]);

            const handleCommentChange = useCallback((e) => {
                const val = e.target.value;
                setComment(val);
                if (commentTimer.current) clearTimeout(commentTimer.current);
                commentTimer.current = setTimeout(() => saveComment(val), 800);
            }, [saveComment]);

            const handleCommentBlur = useCallback(() => {
                if (commentTimer.current) clearTimeout(commentTimer.current);
                saveComment(comment);
            }, [comment, saveComment]);

            useEffect(() => () => { if (commentTimer.current) clearTimeout(commentTimer.current); }, []);

            useEffect(() => {
                if (data.comment === undefined) return;
                if (data.comment === lastSavedComment.current) return;
                if (comment !== lastSavedComment.current) return;
                setComment(data.comment || '');
                lastSavedComment.current = data.comment || '';
            }, [data.comment]);

            const noteTimer = useRef(null);
            const lastSavedNote = useRef(data.campNote || '');

            const saveNote = useCallback(async (value) => {
                if (value === lastSavedNote.current) return;
                setIsSavingNote(true);
                try {
                    const res = await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ campNote: value }),
                        keepalive: true
                    });
                    if (res.ok) lastSavedNote.current = value;
                    else if (res.status === 401) flagAuthExpired();
                } catch(e) {
                    console.error('Failed to save note', e);
                } finally {
                    setIsSavingNote(false);
                }
            }, [data.customName]);

            const handleNoteChange = useCallback((e) => {
                const val = e.target.value;
                setCampNote(val);
                if (noteTimer.current) clearTimeout(noteTimer.current);
                noteTimer.current = setTimeout(() => saveNote(val), 800);
            }, [saveNote]);

            const handleNoteBlur = useCallback(() => {
                if (noteTimer.current) clearTimeout(noteTimer.current);
                saveNote(campNote);
            }, [campNote, saveNote]);

            useEffect(() => () => { if (noteTimer.current) clearTimeout(noteTimer.current); }, []);

            useEffect(() => {
                if (data.campNote === undefined) return;
                if (data.campNote === lastSavedNote.current) return;
                if (campNote !== lastSavedNote.current) return;
                setCampNote(data.campNote || '');
                lastSavedNote.current = data.campNote || '';
            }, [data.campNote]);

            // Flush pending (debounced) note/comment if this row unmounts or the tab closes/hides.
            // saveNote/saveComment are no-ops when the value is unchanged, so a clean field costs nothing.
            const campNoteRef = useRef(campNote); campNoteRef.current = campNote;
            const commentRef = useRef(comment); commentRef.current = comment;
            const saveNoteRef = useRef(saveNote); saveNoteRef.current = saveNote;
            const saveCommentRef = useRef(saveComment); saveCommentRef.current = saveComment;
            useEffect(() => {
                const flush = () => { saveNoteRef.current(campNoteRef.current); saveCommentRef.current(commentRef.current); };
                __dirtyFlushers.add(flush);
                return () => { __dirtyFlushers.delete(flush); flush(); };
            }, []);

            useEffect(() => {
                if (data.costAlertNote === undefined) return;
                if (showAlertPopup) return;
                setCostAlertNote(data.costAlertNote || '');
            }, [data.costAlertNote, showAlertPopup]);

            useEffect(() => {
                if (data.costAlert === undefined) return;
                setCostAlert(data.costAlert || 0);
                if (!showAlertPopup) setAlertValue(data.costAlert || '');
            }, [data.costAlert, showAlertPopup]);

            const handleDelete = async (e) => {
                e.stopPropagation();
                if (!confirm(`Удалить кампанию "${data.customName}"?`)) return;
                setIsDeleting(true);
                try {
                    const res = await fetch(`/api/traffic/${encodeURIComponent(data.customName)}`, { method: 'DELETE' });
                    if (res.ok) {
                        onRefresh();
                    } else {
                        alert('Ошибка удаления. Возможно, кампания уже удалена.');
                        setIsDeleting(false);
                    }
                } catch(err) {
                    alert('Ошибка сети при удалении');
                    setIsDeleting(false);
                }
            };

            const handleSaveEdit = async () => {
                if (!editName.trim() || !editUrl.trim()) { alert('Заполните оба поля'); return; }
                setIsSavingEdit(true);
                try {
                    const res = await fetch(`/api/traffic/${encodeURIComponent(data.customName)}/edit`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ newName: editName.trim(), newUrl: editUrl.trim(), newSiteUrl: editSiteUrl.trim() })
                    });
                    if (res.ok) { setShowEditModal(false); onRefresh(); }
                    else { const err = await res.json().catch(() => ({})); alert(err.error || 'Ошибка сохранения'); }
                } catch (e) { alert('Ошибка сети'); }
                finally { setIsSavingEdit(false); }
            };

            const handleMoveToAdmin = async () => {
                setIsMoving(true);
                try {
                    const res = await fetch('/api/traffic/move-to-admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: data.customName })
                    });
                    if (res.ok) {
                        setShowMoveConfirm(false);
                        onRefresh();
                    } else {
                        const err = await res.json().catch(() => ({}));
                        alert(err.error || 'Ошибка перемещения');
                    }
                } catch (e) {
                    alert('Ошибка сети');
                } finally {
                    setIsMoving(false);
                }
            };

            const handleRefresh = async (e) => {
                e.stopPropagation();
                if (isRefreshing) return;
                setIsRefreshing(true);
                if (onRefresh) {
                    await onRefresh(data.customName);
                }
                setIsRefreshing(false);
            };

            return (
                <div
                    data-camp-name={data.customName}
                    className={`flex flex-col border-b transition-all duration-200 group ${
                        isDragged ? 'opacity-20 scale-[0.98] grayscale' : ''
                    } ${
                        isDraggedOver ? 'border-t-2 border-t-purple-500 shadow-[0_-8px_15px_-5px_rgba(168,85,247,0.4)] bg-zinc-900/60 relative z-10' : 'border-zinc-800/50 hover:bg-zinc-900/30'
                    }`}
                    onMouseEnter={() => { if (onDragEnter) onDragEnter(index); }}
                >
                    <div className="flex items-center p-3 relative">
                        {/* Drag Handle — mousedown triggers drag mode */}
                        <div 
                            className="w-6 h-8 flex-shrink-0 flex items-center justify-center cursor-grab active:cursor-grabbing text-zinc-600 hover:text-zinc-200 transition-colors mr-1 select-none" 
                            title="Перетащите для перемещения"
                            onMouseDown={(e) => {
                                e.preventDefault();
                                if (onDragStart) onDragStart(index);
                            }}
                        >
                            <i className="fas fa-grip-vertical text-[11px] pointer-events-none"></i>
                        </div>
                        {/* Expand/Collapse Chevron */}
                        <div className="w-5 flex-shrink-0 flex items-center justify-center">
                            {hasAnyExpand && (
                                <button
                                    onClick={() => setIsExpanded(!isExpanded)}
                                    className="w-6 h-6 rounded flex items-center justify-center text-zinc-500 hover:text-white hover:bg-zinc-800 transition-colors"
                                >
                                    <i className={`fas fa-chevron-${isExpanded ? 'down' : 'right'} text-[10px]`}></i>
                                </button>
                            )}
                        </div>

                        {/* 1. Название */}
                        <div className="flex-1 min-w-0 pr-4">
                            <div className="flex items-center gap-3 mb-1">
                                <h3 className="font-bold text-sm text-zinc-100 truncate">{data.customName}</h3>
                                <div className="relative">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setShowStatusPicker(!showStatusPicker); }}
                                        className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider border flex items-center gap-1.5 cursor-pointer hover:opacity-80 transition-opacity ${statusInfo.bg} ${statusInfo.color} ${statusInfo.border}`}
                                    >
                                        <i className={`fas ${statusInfo.icon} text-[8px]`}></i>
                                        {statusInfo.label}
                                        <i className="fas fa-caret-down text-[7px] ml-0.5 opacity-50"></i>
                                    </button>
                                    {showStatusPicker && (
                                        <div className="absolute top-7 left-0 z-50 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl py-1 w-32">
                                            {CUSTOM_STATUSES.map(s => (
                                                <button key={s.key} onClick={(e) => { e.stopPropagation(); handleStatusChange(s.key); }}
                                                    className={`w-full px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider flex items-center gap-2 hover:bg-zinc-800 transition-colors ${s.color} ${customStatus === s.key ? 'bg-zinc-800' : ''}`}>
                                                    <i className={`fas ${s.icon} text-[8px]`}></i>
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                {data.url && (
                                    <button 
                                        onClick={(e) => {
                                            copyToClipboard(data.url);
                                            const icon = e.currentTarget.querySelector('i');
                                            icon.className = 'fas fa-check text-green-400 text-[10px]';
                                            setTimeout(() => icon.className = 'fas fa-link text-[10px]', 1500);
                                        }}
                                        className="text-zinc-500 hover:text-white transition-colors"
                                        title="Скопировать ссылку на таблицу"
                                    >
                                        <i className="fas fa-link text-[10px]"></i>
                                    </button>
                                )}
                                <div className="relative">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setShowMoveConfirm(true); }}
                                        className="text-zinc-600 hover:text-purple-400 transition-colors opacity-0 group-hover:opacity-100"
                                        title="Переместить в Traffic Admin"
                                    >
                                        <i className="fas fa-arrow-right text-[10px]"></i>
                                    </button>
                                    {showMoveConfirm && (
                                        <div className="absolute left-0 top-6 z-50 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl p-3 w-56" onClick={e => e.stopPropagation()}>
                                            <p className="text-[11px] text-zinc-300 mb-3">Переместить в <span className="text-purple-400 font-bold">Traffic Admin</span>?</p>
                                            <div className="flex gap-2 justify-end">

// ЧАСТЬ 1: СТОРОННИЙ СЕРВИС (Объявления и Инфо)
// =======================================================
function runThirdPartyService(spreadsheet, accountId, accountName, currency) {
  var now = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd HH:mm:ss');
  var today = Utilities.formatDate(new Date(), 'UTC', 'yyyy-MM-dd');
  var yesterday = Utilities.formatDate(new Date(Date.now() - 86400000), 'UTC', 'yyyy-MM-dd');

  var infoSheet = getOrCreateSheet(spreadsheet, 'Info');
  infoSheet.clear();
  infoSheet.appendRow(['account_id', 'account_name', 'currency', 'updated_at', 'script_run_at']);
  infoSheet.appendRow([accountId, accountName, currency, now, now]);

  var adsSheet = getOrCreateSheet(spreadsheet, 'Ads');
  adsSheet.clear();
  adsSheet.appendRow([
    'campaign_name', 'ad_group_name', 'ad_headline', 'ad_type', 'ad_id',
    'status', 'cost', 'currency', 'clicks', 'impressions', 'conversions', 'avg_cpc', 'date', 'period'
  ]);

  var periods = [
    { label: 'today', apiLabel: 'TODAY', date: today },
    { label: 'yesterday', apiLabel: 'YESTERDAY', date: yesterday },
    { label: 'last_7_days', apiLabel: 'LAST_7_DAYS', date: today },
    { label: 'last_14_days', apiLabel: 'LAST_14_DAYS', date: today },
    { label: 'last_30_days', apiLabel: 'LAST_30_DAYS', date: today },
    { label: 'this_month', apiLabel: 'THIS_MONTH', date: today },
    { label: 'last_month', apiLabel: 'LAST_MONTH', date: today },
    { label: 'this_week_mon_today', apiLabel: 'THIS_WEEK_MON_TODAY', date: today },
    { label: 'last_week_sun_sat', apiLabel: 'LAST_WEEK_SUN_SAT', date: today },
    { label: 'last_business_week', apiLabel: 'LAST_BUSINESS_WEEK', date: today }
  ];

  var existingData = new Set();
  var totalAdded = 0;
  for (var i = 0; i < periods.length; i++) {
    var added = addDataForPeriod(periods[i], adsSheet, existingData, currency);
    totalAdded += added;
  }
}

function addDataForPeriod(periodConfig, adsSheet, existingData, currency) {
  var apiLabel = periodConfig.apiLabel;
  var period = periodConfig.label;
  var dateStr = periodConfig.date;
  var adIterator = AdsApp.ads().forDateRange(apiLabel).get();
  var added = 0;

  while (adIterator.hasNext()) {
    var ad = adIterator.next();
    var adType = getAdType(ad);
    var headline = getAdHeadline(ad);
    var adId = getAdId(ad);
    var stats = ad.getStatsFor(apiLabel);
    var campaignName = ad.getCampaign().getName();
    var adGroupName = ad.getAdGroup().getName();
    var status = ad.isEnabled() ? 'enabled' : 'paused';
    
    var key = dateStr + '|' + period + '|' + campaignName + '|' + adGroupName + '|' + adId;
    
    if (!existingData.has(key)) {
      adsSheet.appendRow([
        campaignName, adGroupName, headline, adType, adId, status,
        stats.getCost(), currency, stats.getClicks(), stats.getImpressions(),
        stats.getConversions(), stats.getAverageCpc(), dateStr, period
      ]);
      existingData.add(key);
      added++;
    }
  }
  return added;
}

function getAdId(ad) {
  try {
    var fullId = ad.getId().toString();
    var parts = fullId.split('/');
    return parts.length > 1 ? parts[parts.length - 1] : fullId;
  } catch (e) { return ''; }
}

function getAdType(ad) {
  if (ad.isType().responsiveSearchAd()) return 'RSA';
  if (ad.isType().expandedTextAd()) return 'ETA';
  if (ad.isType().imageAd()) return 'IMAGE';
  if (ad.isType().videoAd()) return 'VIDEO';
  return 'OTHER';
}

function getAdHeadline(ad) {
  if (ad.isType().responsiveSearchAd()) {
    var headlines = ad.asType().responsiveSearchAd().getHeadlines();
    if (headlines && headlines.length > 0) {
      var allHeadlines = [];
      for (var i = 0; i < Math.min(headlines.length, 5); i++) {
        if (headlines[i].text) allHeadlines.push(headlines[i].text);
      }
      return allHeadlines.join(' | ') || '';
    }
  }
  try { return ad.getHeadline() || ''; } catch (e) { return ''; }
}

function getOrCreateSheet(spreadsheet, sheetName) {
  var sheet = spreadsheet.getSheetByName(sheetName);
  if (!sheet) { sheet = spreadsheet.insertSheet(sheetName); }
  return sheet;
}

function getOrCreateSpreadsheet(accountName, accountId) {
  var props = PropertiesService.getScriptProperties();
  var sheetId = props.getProperty('SHEET_ID');

  if (sheetId) {
    var existing = tryOpenSpreadsheet(sheetId, props);
    if (existing) {
      ensureSharing(sheetId, props);
      return existing;
    }

  Logger.log('Создаём новую таблицу для ' + accountName + ' (' + accountId + ')');
  var spreadsheet = SpreadsheetApp.create('Google Ads Data - ' + accountName + ' (' + accountId + ')');

  props.deleteProperty('SHARING_DONE');

  var maxAttempts = 3;
  var lastError = null;

  for (var i = 0; i < maxAttempts; i++) {
    try {
      return SpreadsheetApp.openById(sheetId);
    } catch (e) {
      lastError = e;
      var msg = (e.message || '').toLowerCase();

      if (msg.indexOf('not found') !== -1 ||
          msg.indexOf('invalid') !== -1 ||
          msg.indexOf('does not exist') !== -1 ||
          msg.indexOf('unable to find') !== -1) {
        Logger.log('Таблица ' + sheetId + ' реально удалена: ' + e.message);
        props.deleteProperty('SHEET_ID');
        props.deleteProperty('SHARING_DONE');

      Logger.log('Попытка ' + (i + 1) + '/' + maxAttempts + ' открыть таблицу упала (временная ошибка): ' + e.message);

      }

                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Ссылка на Google Таблицу</label>
                                                <input
                                                    type="url"
                                                    value={newCampUrl}
                                                    onChange={e => setNewCampUrl(e.target.value)}
                                                    placeholder="https://docs.google.com/spreadsheets/d/..."
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                                <p className="text-[10px] text-zinc-500 mt-1">
                                                    Вставьте ссылку на Google Таблицу, которую сгенерировал скрипт.
                                                </p>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Сайт (необязательно)</label>
                                                <input
                                                    type="url"
                                                    value={newCampSiteUrl}
                                                    onChange={e => setNewCampSiteUrl(e.target.value)}
                                                    placeholder="https://example.com"
                                                    className="w-full bg-zinc-900 border border-zinc-700 text-sm text-zinc-200 p-3 rounded-lg focus:outline-none focus:border-purple-500 transition-colors placeholder:text-zinc-600"
                                                />
                                            </div>

                                            <div className="pt-4 flex justify-end gap-3">
                                                <button
                                                    type="button"
                                                    onClick={() => setIsAddModalOpen(false)}
                                                    className="px-4 py-2 text-xs font-bold text-zinc-400 hover:text-white transition-colors"
                                                >
                                                    ОТМЕНА
                                                </button>
                                                <button
                                                    type="submit"
                                                    className="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 text-xs font-bold rounded shadow-lg transition-colors flex items-center gap-2"
                                                >
                                                    <i className="fas fa-save"></i>
                                                    СОХРАНИТЬ ПРИВЯЗКУ
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}

                    {/* Status Footer */}
                    <footer className="h-8 border-t border-zinc-800 bg-zinc-950 flex items-center justify-between px-4 z-10 text-[10px] text-zinc-500">
                        <div className="flex items-center gap-4">
                            <div>
                                Синхронизация данных: <span className="text-green-500">ONLINE</span>
                            </div>
                            <div className="border-l border-zinc-800 pl-4">
                                Последнее глобальное обновление: <span className="text-zinc-300 font-mono">{lastSyncTime}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {(() => {
                                const t = filteredCampaigns.filter(c => c.customStatus !== 'ban').reduce((a, c) => {
                                    a.imp += c.stats?.today?.impressions || 0;
                                    a.clicks += c.stats?.today?.clicks || 0;
                                    a.cost += c.stats?.today?.cost || 0;
                                    return a;
                                }, { imp: 0, clicks: 0, cost: 0 });
                                return (
                                    <span className="flex items-center gap-2 border-r border-zinc-800 pr-4 text-xs">
                                        <span className="text-zinc-500">Сегодня:</span>
                                        <span className="text-blue-400 font-bold"><i className="far fa-eye mr-0.5"></i>{formatNumber(t.imp)}</span>
                                        <span className="text-purple-400 font-bold"><i className="fas fa-mouse-pointer mr-0.5"></i>{formatNumber(t.clicks)}</span>
                                        <span className="text-red-400 font-bold"><i className="fas fa-dollar-sign mr-0.5"></i>{t.cost.toFixed(2)}</span>
                                    </span>
                                );
                            })()}
                            <span className="uppercase tracking-widest">Кампаний: {filteredCampaigns.length}</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<><App /><SessionExpiredOverlay /></>);
    </script>
</body>

</html>
